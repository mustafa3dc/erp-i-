        // Automatically convert Arabic numerals (١٢٣) to English (123)
        const toEnglishDigits = (str) => {
            if (typeof str !== 'string') return str;
            return str.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d))
                      .replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d));

        // Generate a clean, short 5-digit receipt number from a UUID

            if (!uuidStr) return '0000';
            const clean = uuidStr.replace(/[^a-fA-F0-9]/g, '');
            if (clean.length < 6) return '0000';
            const num = parseInt(clean.slice(-6), 16);
            return (10000 + (num % 90000)).toString();

        // Intercept all keyboard events to convert Arabic/Farsi digits to English instantly as typed
        window.addEventListener('keypress', (e) => {
            const char = String.fromCharCode(e.which || e.keyCode);
            const converted = toEnglishDigits(char);
            if (converted !== char) {
                e.preventDefault();
                const input = e.target;
                if (input && (input.tagName === 'INPUT' || input.tagName === 'TEXTAREA')) {
                    const start = input.selectionStart;
                    const end = input.selectionEnd;
                    const val = input.value;
                    const newVal = val.slice(0, start) + converted + val.slice(end);
                    
                    // Safely set native value for React state binding
                    const setter = Object.getOwnPropertyDescriptor(
                        input.tagName === 'TEXTAREA' ? window.HTMLTextAreaElement.prototype : window.HTMLInputElement.prototype, 
                        "value"
                    ).set;
                    setter.call(input, newVal);
                    
                    input.selectionStart = input.selectionEnd = start + 1;
                    const event = new Event('input', { bubbles: true });
                    input.dispatchEvent(event);
                }
            }
        });

        // Intercept all paste events to convert Arabic/Farsi digits to English in clipboard data
        window.addEventListener('paste', (e) => {
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const converted = toEnglishDigits(pastedText);
            if (converted !== pastedText) {
                e.preventDefault();
                const input = e.target;
                if (input && (input.tagName === 'INPUT' || input.tagName === 'TEXTAREA')) {
                    const start = input.selectionStart;

        // Shop Settings helper - reads from localStorage
        function getShopSettings() {

        // Dashboard Component
        function DashboardPage({ accounts, entries, sales, products }) {
            const calculateTotals = () => {
                let assets = 0, liabilities = 0, equity = 0, revenue = 0, expenses = 0;
                let cashInBox = 0;
                let receivables = 0;

                accounts.forEach(acc => {
                    let bal = 0;
                    entries.forEach(entry => {
                        entry.items.forEach(item => {
                            if (item.account_id === acc.id) {
                                bal += (parseFloat(item.debit) - parseFloat(item.credit));
                            }
                        });
                    });

                    if (acc.type === 'Asset') {
                        assets += bal;
                        if (acc.code === '1010') cashInBox += bal;
                        if (acc.code === '1100') receivables += bal;
                    }
                    else if (acc.type === 'Liability') liabilities += -bal;
                    else if (acc.type === 'Equity') equity += -bal;
                    else if (acc.type === 'Revenue') revenue += -bal;
                    else if (acc.type === 'Expense') expenses += bal;
                });

                return { assets, liabilities, equity, revenue, expenses, cashInBox, receivables };
            };

            const totals = calculateTotals();
            const totalStockItems = products.reduce((acc, p) => acc + p.items.filter(i => i.status === 'Available').length, 0);
            const netProfit = totals.revenue - totals.expenses;

        // POS Component
        function POSPage({ products, sales, refresh }) {
            const [customerName, setCustomerName] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('Cash');
            const [cart, setCart] = useState([]);
            const [errorMsg, setErrorMsg] = useState('');
            const [receipt, setReceipt] = useState(null);
            const [maintenanceNote, setMaintenanceNote] = useState('');
            const [warrantyDays, setWarrantyDays] = useState('30');
            const [customerPhone, setCustomerPhone] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [posFilter, setPosFilter] = useState('All');

            const printReceipt = () => {
                window.print();
            };
            
            const filteredProducts = products.filter(p => {
                const isAvailable = p.type !== 'Phone' || p.items.some(i => i.status === 'Available');
                if (!isAvailable) return false;
                
                // Search query match
                const query = searchQuery.toLowerCase();
                const matchesSearch = p.name.toLowerCase().includes(query) || p.brand.toLowerCase().includes(query);
                
                // Category match
                if (posFilter === 'All') return matchesSearch;
                return p.type === posFilter && matchesSearch;
            });


            const addToCart = (product) => {
                let selectedItemId = null;
                let selectedImei = '';
                let selectedBattery = null;
                if (product.type === 'Phone') {
                    const available = product.items.find(i => i.status === 'Available');
                    if (!available) return;
                    selectedItemId = available.id;
                    selectedImei = available.imei;
                    selectedBattery = available.battery_health;
                }

                if (product.type === 'Phone' && cart.some(item => item.inventory_item_id === selectedItemId)) {
                    alert("هذا الهاتف (IMEI) مضاف بالفعل في الفاتورة!");
                    return;
                }

                setCart([...cart, {
                    product_id: product.id,
                    name: product.name,
                    brand: product.brand,
                    type: product.type,
                    inventory_item_id: selectedItemId,
                    imei: selectedImei,
                    battery_health: selectedBattery,
                    price: product.selling_price
                }]);
            };

            const removeFromCart = (index) => {
                setCart(cart.filter((_, i) => i !== index));
            };

            const updateCartPrice = (index, newPrice) => {
                const newCart = [...cart];
                newCart[index].price = newPrice;
                setCart(newCart);
            };

            const total = cart.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
            const isMaintenanceCart = cart.length > 0 && cart.every(i => i.type === 'Maintenance');

            const handleCheckout = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                if (cart.length === 0) {
                    setErrorMsg("الفاتورة فارغة! أضف سلعاً أولاً.");
                    return;
                }

                try {
                    const saleRes = await axios.post('/sales/', {
                        customer_name: customerName || "زبون نقدي",
                        payment_method: paymentMethod,
                        total_amount: total,
                        items: cart.map(item => ({
                            product_id: item.product_id,
                            inventory_item_id: item.inventory_item_id,
                            price: parseFloat(item.price) || 0
                        }))
                    });
                    // Save receipt data before clearing cart
                    setReceipt({
                        id: saleRes.data.id,
                        type: isMaintenanceCart ? 'maintenance' : 'sale',
                        date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                        customer: customerName || "زبون نقدي",
                        customerPhone: customerPhone,
                        paymentMethod: paymentMethod,
                        items: [...cart],
                        total: total,
                        maintenanceNote: maintenanceNote,
                        warrantyDays: warrantyDays
                    });
                    setCustomerName('');
                    setCustomerPhone('');
                    setPaymentMethod('Cash');
                    setMaintenanceNote('');
                    setWarrantyDays('30');
                    setCart([]);
                    refresh();
                } catch (err) {
                    const serverDetail = err.response?.data?.detail;
                    const errorDetails = serverDetail ? (typeof serverDetail === 'object' ? JSON.stringify(serverDetail) : serverDetail) : '';
                    setErrorMsg(errorDetails || err.message || "حدث خطأ أثناء إتمام عملية البيع.");
                }
            };

            return (
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    {/* Left: Cart & Billing Panel */}
                    <div class="lg:col-span-7 p-6 bg-slate-900/60 border border-slate-800 rounded-3xl flex flex-col justify-between min-h-[550px] shadow-2xl backdrop-blur-md">
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="font-bold text-lg text-emerald-400 flex items-center gap-2">
                                    <Icon name="shopping-cart" className="w-5 h-5 text-emerald-400" />
                                    فاتورة البيع الحالية
                                </h3>
                                {cart.length > 0 && (
                                    <button onClick={() => setCart([])} class="text-xs text-rose-400 hover:text-rose-300 transition-colors flex items-center gap-1">
                                        <Icon name="trash" className="w-3.5 h-3.5" /> مسح الكل
                                    </button>
                                )}
                            </div>

                            {errorMsg && (
                                <div class="p-3.5 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm rounded-2xl mb-4 flex items-center gap-2">
                                    <Icon name="alert-triangle" className="w-4 h-4" /> {errorMsg}
                                </div>
                            )}

                            <div class="space-y-3 mb-6 max-h-[360px] overflow-y-auto pr-1">
                                {cart.map((item, index) => (
                                    <div key={index} class="p-4 bg-slate-950/60 border border-slate-850 hover:border-slate-800 rounded-2xl flex justify-between items-center transition-all">

        // Inventory Component
        function InventoryPage({ products, refresh }) {
            const [name, setName] = useState('');
            const [compatibleDevice, setCompatibleDevice] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('Apple');
            const [customBrand, setCustomBrand] = useState('');
            const [type, setType] = useState('Phone');
            const [purchasePrice, setPurchasePrice] = useState('');
            const [sellingPrice, setSellingPrice] = useState('');
            const [imeisInput, setImeisInput] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            const [activeCategory, setActiveCategory] = useState('Phone');
            const [searchQuery, setSearchQuery] = useState('');
            const [quantity, setQuantity] = useState('1');
            const [batteryHealth, setBatteryHealth] = useState('');
            const [showSoldItems, setShowSoldItems] = useState(false);

            const POPULAR_BRANDS = ["Apple", "Samsung", "Xiaomi", "Huawei", "Realme", "Infinix", "Honor", "Oppo", "Vivo", "أخرى"];

            // Sync product type state with the active category tab
            useEffect(() => {
                setType(activeCategory);
            }, [activeCategory]);

            const handleCreateProduct = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                
                const finalBrand = selectedBrand === 'أخرى' ? customBrand.trim() : selectedBrand;
                if (!finalBrand) {
                    setErrorMsg("يرجى تحديد أو كتابة اسم الشركة المصنعة.");
                    return;
                }

                // If maintenance, append compatible device to name
                let finalName = name.trim();
                if (activeCategory === 'Maintenance' && compatibleDevice.trim()) {
                    finalName = `${finalName} (${compatibleDevice.trim()})`;
                }

                const imeis = imeisInput.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0);

                try {
                    await axios.post('/products/', {
                        name: finalName,
                        brand: finalBrand,
                        type: activeCategory, // Locked to active tab category
                        purchase_price: parseFloat(purchasePrice) || 0,
                        selling_price: parseFloat(sellingPrice) || 0,
                        imeis: activeCategory === 'Phone' ? imeis : null,
                        quantity: activeCategory === 'Phone' ? 1 : parseInt(quantity) || 1,
                        battery_health: (activeCategory === 'Phone' && selectedBrand === 'Apple' && batteryHealth) ? parseInt(batteryHealth) : null
                    });
                    setName('');
                    setCompatibleDevice('');
                    setCustomBrand('');
                    setPurchasePrice('');
                    setSellingPrice('');
                    setImeisInput('');
                    setQuantity('1');
                    setBatteryHealth('');
                    refresh();

                    try {
                        const res = await axios.get('/telegram/settings/');
                        setBotToken(res.data.token);
                        setIsBotRunning(res.data.is_running);
                    } catch (e) {
                        console.error("Failed to load Telegram Bot settings:", e);
                    }
                };
                fetchSettings();

                e.preventDefault();
                setSaving(true);

                    setIsBotRunning(res.data.is_running);
                    alert("تم حفظ توكن البوت وتحديث التشغيل بنجاح!");

                    <input
                        type="text"
                        id={id}
                        value={value}
                        onChange={e => onChange(e.target.value)}
                        placeholder={placeholder}
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 text-sm focus:outline-none focus:border-emerald-500 transition-colors"
                    />
                </div>
            );
        }

        // Maintenance Jobs tracker page
        function MaintenanceJobsPage({ jobs, products = [], refresh }) {
            const [customerName, setCustomerName] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [deviceModel, setDeviceModel] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('Apple');
            const [imei, setImei] = useState('');
            const [problem, setProblem] = useState('');
            const [cost, setCost] = useState('');
            const [warrantyDays, setWarrantyDays] = useState('30');
            const [errorMsg, setErrorMsg] = useState('');
            const [activeTab, setActiveTab] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [showAddForm, setShowAddForm] = useState(false);
            const [receipt, setReceipt] = useState(null);

            const handleCreateJob = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                if (!customerName || !deviceModel) {
                    setErrorMsg("يرجى ملء الحقول الإلزامية (الاسم، والموديل).");
                    return;
                }

                try {
                    const finalDeviceModel = `${selectedBrand} - ${deviceModel.trim()}`;
                    await axios.post('/maintenance/', {
                        customer_name: customerName,
                        customer_phone: customerPhone || null,
                        device_model: finalDeviceModel,
                        imei: imei || null,
                        problem_description: problem || null,
                        cost: parseFloat(cost) || 0,
                        status: "Under Inspection",
                        warranty_days: parseInt(warrantyDays) || 30
                    });
                    // Reset
                    setCustomerName('');
                    setCustomerPhone('');
                    setDeviceModel('');
                    setImei('');
                    setProblem('');
                    setCost('');
                    setWarrantyDays('30');
                    setShowAddForm(false);
                    refresh();
                } catch (err) {
                    setErrorMsg(err.response?.data?.detail || "حدث خطأ أثناء حفظ جهاز الصيانة.");
                }
            };

            const handleUpdateStatus = async (jobId, currentStatus, currentCost) => {
                let nextStatus = "Under Inspection";
                if (currentStatus === "Under Inspection") nextStatus = "Repaired";
                else if (currentStatus === "Repaired") nextStatus = "Delivered";
                
                try {
                    const res = await axios.put(`/maintenance/${jobId}/`, {
                        status: nextStatus,
                        cost: parseFloat(currentCost) || 0
                    });
                    refresh();
                    
                    // If transitioned to Delivered, show receipt!
                    if (nextStatus === "Delivered") {
                        const s = getShopSettings();
                        setReceipt({
                            id: res.data.id,
                            type: 'maintenance',
                            date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                            customer: res.data.customer_name,
                            customerPhone: res.data.customer_phone,
                            paymentMethod: 'Cash',
                            items: [{
                                brand: 'صيانة جهاز',
                                name: res.data.device_model,
                                imei: res.data.imei,
                                price: res.data.cost
                            }],
                            total: res.data.cost,
                            maintenanceNote: res.data.problem_description,
                            warrantyDays: res.data.warranty_days
                        });
                    }
                } catch (e) {
                    alert("حدث خطأ أثناء تحديث حالة جهاز الصيانة.");
                }
            };

            const printReceipt = () => {
                window.print();
            };

            const filteredJobs = jobs.filter(job => {
                const matchesTab = activeTab === 'All' || job.status === activeTab;
                const matchesSearch = 
                    job.customer_name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    job.device_model.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    (job.imei && job.imei.toLowerCase().includes(searchQuery.toLowerCase())) ||
                    (job.customer_phone && job.customer_phone.includes(searchQuery));
                return matchesTab && matchesSearch;
            });

            const getStatusColor = (status) => {
                switch(status) {
                    case 'Under Inspection': return 'bg-amber-500/10 text-amber-500 border border-amber-500/10';
                    case 'Repaired': return 'bg-sky-500/10 text-sky-500 border border-sky-500/10';
                    case 'Delivered': return 'bg-emerald-500/10 text-emerald-500 border border-emerald-500/10';
                    default: return 'bg-slate-500/10 text-slate-400 border border-slate-500/10';
                }
            };

            const getStatusText = (status) => {
                switch(status) {
                    case 'Under Inspection': return 'تحت الفحص / التصليح';
                    case 'Repaired': return 'جاهز للاستلام';
                    case 'Delivered': return 'تم التسليم والقبض';
                    default: return status;
                }
            };

            const typedModel = deviceModel.trim().toLowerCase();
            const matchingParts = typedModel.length >= 2 ? products.filter(p => {
                if (p.type !== 'Maintenance') return false;
                const availableItems = p.items.filter(i => i.status === 'Available');
                return p.name.toLowerCase().includes(typedModel) && availableItems.length > 0;
            }) : [];

            return (
                <div class="space-y-6">
                    {/* Header Controls */}
                    <div class="flex justify-between items-center bg-slate-900/60 p-6 border border-slate-800 rounded-3xl">
                        <div class="flex gap-2">
                            {['All', 'Under Inspection', 'Repaired', 'Delivered'].map(status => (
                                <button 
                                    key={status}
                                    onClick={() => setActiveTab(status)}
                                    class={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${
                                        activeTab === status 
                                        ? 'bg-brand-500/10 text-brand-600 border border-brand-500/20' 
                                        : 'bg-slate-950 text-slate-450 border border-slate-800 hover:text-slate-200'
                                    }`}
                                >
                                    {status === 'All' && 'كل الأجهزة'}
                                    {status === 'Under Inspection' && 'تحت الفحص صيانة'}
                                    {status === 'Repaired' && 'جاهز للاستلام'}
                                    {status === 'Delivered' && 'تم تسليمه'}
                                </button>
                            ))}
                        </div>
                        <button 
                            onClick={() => setShowAddForm(!showAddForm)}
                            class="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl text-xs flex items-center gap-2 shadow-lg transition-all"
                        >
                            <Icon name="plus" className="w-4 h-4" />
                            استلام جهاز جديد
                        </button>
                    </div>

                    {showAddForm && (
                        /* Add form modal/panel */
                        <form onSubmit={handleCreateJob} class="p-6 bg-slate-900 border border-slate-800 rounded-3xl space-y-4 max-w-2xl">
                            <h3 class="font-bold text-base text-brand-600">استمارة استلام جهاز صيانة جديد</h3>
                            {errorMsg && (
                                <div class="p-3 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm rounded-xl">
                                    {errorMsg}
                                </div>
                            )}
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">اسم الزبون *</label>
                                    <input type="text" required value={customerName} onChange={e => setCustomerName(e.target.value)} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-500" />
                                </div>
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">رقم الهاتف</label>
                                    <input type="text" value={customerPhone} onChange={e => setCustomerPhone(e.target.value)} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-500" />
                                </div>
                            </div>
                            {/* Brand selection inside Maintenance Form */}
                            <div>
                                <label class="block text-xs text-slate-400 mb-1.5">الشركة المصنعة (البراند) *</label>
                                <div class="flex flex-wrap gap-2">
                                    {["Apple", "Samsung", "Xiaomi", "Huawei", "Realme", "Infinix", "Honor", "Oppo", "أخرى"].map(brandName => (
                                        <button
                                            type="button"
                                            key={brandName}
                                            onClick={() => setSelectedBrand(brandName)}
                                            class={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all border ${
                                                selectedBrand === brandName 
                                                ? 'bg-brand-500/10 text-brand-600 border-brand-500/20 shadow-sm' 
                                                : 'bg-slate-950 text-slate-450 border-slate-800 hover:text-slate-200'
                                            }`}
                                        >
                                            {brandName}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">موديل الجهاز *</label>
                                    <input 
                                        type="text" 
                                        required 
                                        value={deviceModel} 
                                        onChange={e => setDeviceModel(e.target.value)} 
                                        list="maintenance-device-models"
                                        placeholder="مثال: iPhone 12 Pro" 
                                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-500" 
                                    />
                                    <datalist id="maintenance-device-models">
                                        {(BRAND_MODELS[selectedBrand] || []).map(m => (
                                            <option key={m} value={m} />
                                        ))}
                                    </datalist>
                                </div>
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">رقم الـ IMEI أو التسلسلي</label>
                                    <input type="text" value={imei} onChange={e => setImei(e.target.value)} class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-500" />
                                </div>
                            </div>

                            {/* Spares indicator */}
                            {matchingParts.length > 0 && (
                                <div class="p-3.5 bg-emerald-500/5 border border-emerald-500/10 rounded-2xl space-y-1">
                                    <div class="text-xs font-bold text-emerald-600 flex items-center gap-1.5">
                                        <Icon name="check-circle" className="w-4 h-4 text-emerald-500" />
                                        <span>قطع غيار صيانة متوفرة في المخزن لهذا الجهاز:</span>
                                    </div>
                                    <div class="flex flex-wrap gap-2 mt-1.5">
                                        {matchingParts.map(p => {
                                            const qty = p.items.filter(i => i.status === 'Available').length;
                                            return (
                                                <span key={p.id} class="px-2.5 py-1 bg-slate-950 border border-slate-850 text-[10px] text-slate-300 font-bold rounded-lg flex items-center gap-1">
                                                    🛠️ {p.brand} - {p.name} (المتوفر: {qty} قطع)
                                                </span>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">تكلفة الصيانة المقدرة (د.ع)</label>
                                    <input 
                                        type="text" 
                                        inputMode="decimal"
                                        value={cost} 
                                        onChange={e => {
                                            const clean = toEnglishDigits(e.target.value).replace(/[^0-9.]/g, '');
                                            setCost(clean);
                                        }} 
                                        placeholder="0" 
                                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-500 text-right font-mono" 
                                    />
                                </div>
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">كفالة الصيانة (أيام)</label>
                                    <input 
                                        type="text" 
                                        inputMode="numeric"
                                        value={warrantyDays} 
                                        onChange={e => {
                                            const clean = toEnglishDigits(e.target.value).replace(/[^0-9]/g, '');
                                            setWarrantyDays(clean);
                                        }} 
                                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-500 text-right font-mono" 
                                    />
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">توصيف المشكلة والقطع المستبدلة</label>
                                <div class="flex flex-wrap gap-1.5 mb-2.5">
                                    {["تبديل شاشة", "تبديل بطارية", "تبديل ظهر", "مشكلة بالبورد", "قاعدة شحن", "صيانة سماعة/مايك"].map(prob => (
                                        <button
                                            type="button"
                                            key={prob}
                                            onClick={() => {
                                                const current = problem ? problem.trim() : '';
                                                setProblem(current ? `${current} — ${prob}` : prob);
                                            }}
                                            class="px-2.5 py-1 rounded-lg bg-slate-950 hover:bg-slate-850 text-[10px] font-bold text-slate-400 hover:text-slate-200 border border-slate-800 transition-all"
                                        >
                                            + {prob}
                                        </button>
                                    ))}
                                </div>
                                <textarea rows="2" value={problem} onChange={e => setProblem(e.target.value)} placeholder="مثال: تبديل شاشة مكسورة — الزبون يشتكي من حرارة في البطارية" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-500 resize-none" />
                            </div>
                            <div class="flex gap-3">
                                <button type="submit" class="px-6 py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl text-xs transition-all shadow-md">حفظ واستلام</button>
                                <button type="button" onClick={() => setShowAddForm(false)} class="px-6 py-2.5 bg-slate-950 border border-slate-800 text-slate-400 hover:text-slate-250 font-bold rounded-xl text-xs transition-all">إلغاء</button>
                            </div>
                        </form>
                    )}

                    {/* Jobs Table List */}
                    <div class="p-6 bg-slate-900 border border-slate-800 rounded-3xl shadow-xl">
                        <div class="mb-4 relative">
                            <input 
                                type="text"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                                placeholder="ابحث باسم الزبون، هاتف، موديل الجهاز، أو IMEI..."
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl pr-10 pl-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-500"
                            />
                            <Icon name="search" className="w-4 h-4 text-slate-500 absolute right-3.5 top-3.5" />
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm">
                                <thead>
                                    <tr class="border-b border-slate-800 text-slate-400 text-xs">
                                        <th class="py-3 px-4">الزبون والتاريخ</th>
                                        <th class="py-3 px-4">الجهاز</th>
                                        <th class="py-3 px-4">المشكلة / العطل</th>
                                        <th class="py-3 px-4 text-left">التكلفة</th>
                                        <th class="py-3 px-4 text-center">الحالة والإجراء</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredJobs.map(job => (
                                        <tr key={job.id} class="border-b border-slate-850 hover:bg-slate-950/20 text-slate-200">
                                            {/* Customer & Date */}
                                            <td class="py-3 px-4">
                                                <div class="font-bold text-slate-100">{job.customer_name}</div>
                                                <div class="text-[11px] text-slate-500 font-mono mt-0.5">{job.customer_phone || '-'}</div>
                                                <div class="text-[10px] text-slate-500 mt-1">{new Date(job.created_at).toLocaleDateString('en-GB')}</div>
                                            </td>

                                            {/* Device */}
                                            <td class="py-3 px-4">
                                                <div class="font-bold text-slate-200">{job.device_model}</div>
                                                {job.imei && <span class="text-[10px] text-slate-500 font-mono block mt-0.5">IMEI: {job.imei}</span>}
                                                {(() => {
                                                    const cleanJobModel = job.device_model.trim().toLowerCase();
                                                    const partsInStock = cleanJobModel.length >= 2 ? products.filter(p => 
                                                        p.type === 'Maintenance' && 
                                                        p.name.toLowerCase().includes(cleanJobModel) && 
                                                        p.items.some(i => i.status === 'Available')
                                                    ) : [];
                                                    
                                                    if (partsInStock.length > 0 && job.status !== 'Delivered') {
                                                        return (
                                                            <span class="text-[10px] text-emerald-500 font-bold flex items-center gap-1 mt-1">
                                                                ✓ متوفر {partsInStock.length} قطع غيار بالمخزن
                                                            </span>
                                                        );
                                                    }
                                                    return null;
                                                })()}
                                            </td>

                                            {/* Problem Description */}
                                            <td class="py-3 px-4 text-xs text-slate-450 max-w-[220px] truncate" title={job.problem_description}>
                                                {job.problem_description || '-'}
                                            </td>

                                            {/* Cost */}
                                            <td class="py-3 px-4 text-left font-mono font-bold text-emerald-400">
                                                {parseFloat(job.cost).toLocaleString()} د.ع
                                            </td>

                                            {/* Status & Actions */}
                                            <td class="py-3 px-4 text-center">
                                                <div class="flex flex-col items-center gap-1.5 justify-center">
                                                    <span class={`px-2.5 py-0.5 rounded-full text-[9px] font-bold whitespace-nowrap inline-block ${getStatusColor(job.status)}`}>
                                                        {getStatusText(job.status)}
                                                    </span>
                                                    {job.status !== 'Delivered' ? (
                                                        <button 
                                                            onClick={() => handleUpdateStatus(job.id, job.status, job.cost)}
                                                            class={`px-2.5 py-1 rounded-lg text-[10px] font-bold text-white transition-all whitespace-nowrap ${
                                                                job.status === 'Under Inspection' ? 'bg-sky-600 hover:bg-sky-700' : 'bg-emerald-600 hover:bg-emerald-700'
                                                            }`}
                                                        >
                                                            {job.status === 'Under Inspection' ? 'جاهز للتسليم' : 'تسليم وقبض'}
                                                        </button>
                                                    ) : (
                                                        <button 
                                                            onClick={() => {
                                                                setReceipt({
                                                                    id: job.id,
                                                                    type: 'maintenance',
                                                                    date: new Date(job.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                                                                    customer: job.customer_name,
                                                                    customerPhone: job.customer_phone,
                                                                    paymentMethod: 'Cash',
                                                                    items: [{
                                                                        brand: 'صيانة جهاز',
                                                                        name: job.device_model,
                                                                        imei: job.imei,
                                                                        price: job.cost
                                                                    }],
                                                                    total: job.cost,
                                                                    maintenanceNote: job.problem_description,
                                                                    warrantyDays: job.warranty_days
                                                                });
                                                            }}
                                                            class="px-2 py-1 bg-slate-850 hover:bg-slate-800 text-slate-350 font-bold rounded-lg text-[10px] flex items-center gap-1 mx-auto border border-slate-800"
                                                        >
                                                            <Icon name="printer" className="w-3 h-3" /> طباعة الوصل
                                                        </button>
                                                    )}
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredJobs.length === 0 && (
                                        <tr>
                                            <td colspan="5" class="py-12 text-center text-slate-500 text-sm">لا توجد أجهزة صيانة مطابقة للبحث أو الفلتر.</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Receipt Modal */}
                    {receipt && (() => {
                        const s = getShopSettings();
                        const shopName = s.shopName || 'متجر الموبايل';
                        const currency = s.currency || 'د.ع';
                        const phone = s.phone || '';
                        const email = s.email || '';
                        const address = s.address || '';
                        const footerNote = s.footerNote || 'شكراً لتعاملكم معنا 🙏';
                        const invoiceNum = 'INV-' + getShortId(receipt.id);
                        
                        return (
                        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setReceipt(null)}>
                            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                <div id="print-receipt">
                                    <div class="mnt">
                                        {/* Head: Title + Logo */}
                                        <div class="mnt-head">
                                            <div>
                                                <div class="mnt-head-title">وصل صيانة وأمانة</div>
                                                <div class="mnt-head-sub">Maintenance & Service Receipt</div>
                                            </div>
                                            <div class="mnt-head-logo">صيانة</div>
                                        </div>

                                        {/* Company block */}
                                        <div class="mnt-company">
                                            <span class="mnt-company-name">{shopName}</span>
                                            {phone && <span>هاتف: {phone}&nbsp;&nbsp;</span>}
                                            {email && <span>بريد: {email}</span>}
                                            {address && <div>العنوان: {address}</div>}
                                        </div>

                                        {/* 2-Column Info Box */}
                                        <div class="mnt-info">
                                            <div class="mnt-info-box">
                                                <div class="mnt-info-box-title">معلومات الزبون</div>
                                                <div class="mnt-info-row"><span class="mnt-info-key">الاسم:</span><span class="mnt-info-val">{receipt.customer}</span></div>
                                                {receipt.customerPhone && <div class="mnt-info-row"><span class="mnt-info-key">الهاتف:</span><span class="mnt-info-val">{receipt.customerPhone}</span></div>}
                                                <div class="mnt-info-row"><span class="mnt-info-key">طريقة الدفع:</span><span class="mnt-info-val">نقدي</span></div>
                                            </div>
                                            <div class="mnt-info-box">
                                                <div class="mnt-info-box-title">تفاصيل الوصل</div>
                                                <div class="mnt-info-row"><span class="mnt-info-key">رقم الوصل:</span><span class="mnt-info-val">{invoiceNum}</span></div>
                                                <div class="mnt-info-row"><span class="mnt-info-key">التاريخ:</span><span class="mnt-info-val">{receipt.date}</span></div>
                                            </div>
                                        </div>

                                        {/* Description of Service */}
                                        <div class="mnt-section-title">الأجهزة والخدمات المنجزة</div>
                                        <table class="mnt-table">
                                            <thead>
                                                <tr>
                                                    <th>اسم الجهاز / المنتج</th>
                                                    <th class="th-r">التكلفة</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {receipt.items.map((item, i) => (
                                                    <tr key={i}>
                                                        <td>
                                                            <strong>{item.brand} — {item.name}</strong>
                                                            {item.imei && <span style={{display:'block', fontSize:'11px', color:'#777'}}>IMEI: {item.imei}</span>}
                                                        </td>
                                                        <td class="td-r">{parseFloat(item.price).toLocaleString()} {currency}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>

                                        {/* Maintenance details note */}
                                        {receipt.maintenanceNote && (
                                            <div class="mnt-note-box">
                                                <div class="mnt-note-label">تقرير الفحص والصيانة:</div>
                                                <div class="mnt-note-text">{receipt.maintenanceNote}</div>
                                            </div>
                                        )}

                                        {/* Warranty block */}
                                        {receipt.warrantyDays && parseInt(receipt.warrantyDays) > 0 && (
                                            <div class="mnt-warranty">
                                                <span class="mnt-warranty-icon">🛡️</span>
                                                <div>
                                                    <div class="mnt-warranty-title">الضمان والكفالة</div>
                                                    <div class="mnt-warranty-text">هذا الجهاز مكفول لمدة {receipt.warrantyDays} يوم من تاريخ استلامه على القطع المستبدلة فقط. الكفالة لا تشمل سوء الاستخدام أو الكسر أو السوائل.</div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Totals */}
                                        <div class="mnt-total">
                                            <div class="mnt-total-box">
                                                <span class="mnt-total-label">المجموع الكلي:</span>
                                                <span class="mnt-total-amount">{receipt.total.toLocaleString()} {currency}</span>
                                            </div>
                                        </div>

                                        {/* Signature lines */}
                                        <div class="mnt-sign">
                                            <div class="mnt-sign-block">
                                                <div class="mnt-sign-line"></div>
                                                <div class="mnt-sign-label">توقيع الزبون</div>
                                            </div>
                                            <div class="mnt-sign-block">
                                                <div class="mnt-sign-line"></div>
                                                <div class="mnt-sign-label">توقيع الفني / المستلم</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex gap-3 p-4 border-t border-gray-100 bg-gray-50 rounded-b-2xl no-print">
                                    <button onClick={() => setReceipt(null)} class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-bold text-sm hover:bg-gray-100 transition-all">
                                        إغلاق
                                    </button>
                                    <button onClick={printReceipt} class="flex-1 py-3 rounded-xl bg-emerald-700 hover:bg-emerald-800 text-white font-bold text-sm flex items-center justify-center gap-2 transition-all">
                                        <Icon name="printer" className="w-4 h-4" /> طباعة الفاتورة
                                    </button>
                                </div>
                            </div>
                        </div>
                        );
                    })()}
                </div>
            );
        }

        // Shop Settings Page
        function ShopSettingsPage() {
            const defaultSettings = {
                shopName: 'متجر الموبايل',
                currency: 'د.ع',
                phone: '',
                email: '',
                address: '',
                footerNote: 'شكراً لتعاملكم معنا 🙏',
                systemPassword: '123456'
            };

            const [settings, setSettings] = useState(() => {
                try {
                    return { ...defaultSettings, ...JSON.parse(localStorage.getItem('shopSettings') || '{}') };
                } catch { return defaultSettings; }
            });
            const [saved, setSaved] = useState(false);

            const handleChange = (key, value) => {
                setSettings(prev => ({ ...prev, [key]: value }));
                setSaved(false);
            };

            const handleSave = (e) => {
                e.preventDefault();
                localStorage.setItem('shopSettings', JSON.stringify(settings));
                setSaved(true);
                setTimeout(() => setSaved(false), 2500);
            };

            return (
                <div class="max-w-2xl space-y-8">

                    {/* Shop Identity */}
                    <div class="p-6 bg-slate-900 border border-slate-800 rounded-2xl">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-9 h-9 rounded-xl bg-emerald-500/10 flex items-center justify-center">
                                <Icon name="store" className="w-5 h-5 text-emerald-400" />
                            </div>
                            <div>
                                <h3 class="font-bold text-emerald-400">هوية المتجر</h3>
                                <p class="text-xs text-slate-500">تظهر هذه المعلومات في رأس الفاتورة</p>
                            </div>
                        </div>
                        <form onSubmit={handleSave} class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <SettingsField label="اسم المتجر" id="shopName" value={settings.shopName} onChange={v => handleChange('shopName', v)} placeholder="متجر الموبايل" />
                                <SettingsField label="العملة" id="currency" value={settings.currency} onChange={v => handleChange('currency', v)} placeholder="د.ع" />
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <SettingsField label="رقم الهاتف / الواتساب" id="phone" value={settings.phone} onChange={v => handleChange('phone', v)} placeholder="07xxxxxxxxx" />
                                <SettingsField label="البريد الإلكتروني" id="email" value={settings.email} onChange={v => handleChange('email', v)} placeholder="example@email.com" />
                            </div>
                            <SettingsField label="العنوان / الموقع" id="address" value={settings.address} onChange={v => handleChange('address', v)} placeholder="بغداد - الكرادة - ..." />
                            <SettingsField label="نص ختام الفاتورة" id="footerNote" value={settings.footerNote} onChange={v => handleChange('footerNote', v)} placeholder="شكراً لتعاملكم معنا 🙏" />
                            <SettingsField label="رمز قفل النظام السري (Password)" id="systemPassword" value={settings.systemPassword} onChange={v => handleChange('systemPassword', v)} placeholder="123456" />

                            <div class="pt-2 flex items-center gap-4">
                                <button
                                    type="submit"
                                    class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-emerald-600/20"
                                >
                                    حفظ الإعدادات
                                </button>
                                {saved && (
                                    <span class="text-emerald-400 text-sm font-bold flex items-center gap-1">
                                        <Icon name="check-circle" className="w-4 h-4" /> تم الحفظ بنجاح!
                                    </span>
                                )}
                            </div>
                        </form>
                    </div>

                    {/* Live Invoice Preview */}
                    <div class="p-6 bg-slate-900 border border-slate-800 rounded-2xl">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-9 h-9 rounded-xl bg-sky-500/10 flex items-center justify-center">
                                <Icon name="eye" className="w-5 h-5 text-sky-400" />
                            </div>
                            <h3 class="font-bold text-sky-400">معاينة رأس الفاتورة</h3>
                        </div>
                        <div style={{background:'#064e3b', borderRadius:'12px', padding:'20px 24px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <div style={{textAlign:'left', color:'rgba(255,255,255,0.6)', fontSize:'12px', lineHeight:'2'}}>
                                {settings.phone && <div>📞 {settings.phone}</div>}
                                {settings.email && <div>✉ {settings.email}</div>}
                                {settings.address && <div>📍 {settings.address}</div>}
                                {!settings.phone && !settings.email && !settings.address && (
                                    <div style={{color:'rgba(255,255,255,0.3)'}}>أضف معلومات الاتصال</div>
                                )}
                            </div>
                            <div style={{textAlign:'right'}}>
                                <div style={{fontSize:'22px', fontWeight:'900', color:'#fff'}}>{settings.shopName || 'اسم المتجر'}</div>
                                <div style={{fontSize:'11px', color:'rgba(255,255,255,0.6)', marginTop:'2px'}}>فاتورة مبيعات / Sales Invoice</div>
                            </div>
                        </div>
                    </div>

                    {/* Database Reset (Danger Zone) */}
                    <div class="p-6 bg-rose-50 border border-rose-200 rounded-2xl shadow-sm">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-9 h-9 rounded-xl bg-rose-500/10 flex items-center justify-center">
                                <Icon name="trash-2" className="w-5 h-5 text-rose-600" />
                            </div>
                            <div>
                                <h3 class="font-bold text-rose-700">تصفير قاعدة البيانات (منطقة خطر)</h3>
                                <p class="text-xs text-rose-500 font-bold">هذا الإجراء سيقوم بمسح كافة المبيعات، البضائع، القيود المحاسبية، وأجهزة الصيانة نهائياً ولا يمكن التراجع عنه!</p>
                            </div>
                        </div>
                        <button 
                            type="button"
                            onClick={async () => {
                                const confirmReset = confirm("⚠️ تحذير: هل أنت متأكد من تصفير قاعدة البيانات ومسح كل شيء؟ لا يمكن استعادة البيانات المحذوفة!");
                                if (confirmReset) {
                                    try {
                                        const res = await axios.post('/reset-db/');
                                        if (res.data.status === 'success') {
                                            alert("تم تصفير قاعدة البيانات بالكامل بنجاح! سيتم تحديث الصفحة.");
                                            window.location.reload();
                                        }
                                    } catch (e) {
                                        alert("حدث خطأ أثناء محاولة تصفير قاعدة البيانات.");
                                    }
                                }
                            }}
                            class="px-6 py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl text-xs transition-all shadow-md shadow-rose-600/10 flex items-center gap-2"
                        >
                            <Icon name="alert-triangle" className="w-4 h-4" />
                            تصفير كل شيء وبدء عمل حقيقي
                        </button>
                    </div>

                </div>
            );
        }

        // Render application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
