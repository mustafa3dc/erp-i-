    <style>
        body { font-family: 'Tajawal', 'Outfit', sans-serif; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* CLEAN INVOICE */
        #print-receipt { background: #fff; }
        /* CLEAN INVOICE - MODERN MINIMALIST */
        #print-receipt { background: #fff; }
        .inv, .mnt {
            font-family: 'Outfit', 'Tajawal', sans-serif;
            background: #fff;
            color: #0f172a;
            padding: 40px 48px;
            max-width: 750px;
            margin: 0 auto;
        }
        .inv { direction: ltr; }
        .mnt { direction: rtl; }

        /* Headings */
        .inv-head, .mnt-head { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 1px solid #e2e8f0; 
            padding-bottom: 20px; 
        }
        .inv-head-title, .mnt-head-title { 
            font-size: 24px; 
            font-weight: 800; 
            color: #0f172a; 
            letter-spacing: 0.5px; 
        }
        .inv-head-sub, .mnt-head-sub { 
            font-size: 11px; 
            color: #64748b; 
            margin-top: 4px; 
        }
        .inv-head-logo, .mnt-head-logo { 
            font-size: 11px; 
            font-weight: 700; 
            color: #475569; 
            background: #f1f5f9; 
            padding: 8px 16px; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0; 
        }

        /* Company Details */
        .inv-company, .mnt-company { 
            margin-bottom: 24px; 
            font-size: 12px; 
            color: #475569; 
            line-height: 1.6; 
        }
        .inv-company-name, .mnt-company-name { 
            font-weight: 800; 
            font-size: 14px; 
            color: #0f172a; 
            display: block; 
            margin-bottom: 4px; 
        }

        /* Info blocks */
        .inv-info, .mnt-info { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 20px; 
            border-top: 1px solid #e2e8f0; 
            border-bottom: 1px solid #e2e8f0; 
            padding: 16px 0; 
            margin-bottom: 28px; 
        }
        .mnt-info {
            grid-template-columns: 1fr 1fr;
        }
        .inv-info-block, .mnt-info-box {
            font-size: 12px;
        }
        .inv-info-block:last-child { text-align: right; }
        .inv-info-label, .mnt-info-box-title { 
            font-size: 10px; 
            font-weight: 800; 
            color: #64748b; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 6px; 
            display: block; 
        }
        .inv-info-val, .mnt-info-val { 
            font-size: 12px; 
            color: #0f172a; 
            font-weight: 650; 
        }
        .inv-info-row, .mnt-info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 11px; 
            margin-bottom: 4px; 
            color: #475569;
        }
        .mnt-info-row {
            flex-direction: row-reverse;
        }
        .inv-info-row-key, .mnt-info-key { font-weight: 700; color: #64748b; }
        .inv-info-row-val, .mnt-info-val { color: #0f172a; }

        /* Tables */
        .inv-table, .mnt-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 12px; 
            margin-bottom: 24px; 
        }
        .inv-table thead tr, .mnt-table thead tr { 
            border-bottom: 1px solid #0f172a; 
        }
        .inv-table thead th, .mnt-table thead th { 
            padding: 10px 8px; 
            font-size: 11px; 
            font-weight: 850; 
            color: #0f172a; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            text-align: left; 
        }
        .mnt-table thead th { text-align: right; }
        .inv-table thead th.th-desc { text-align: center; }
        .inv-table thead th.th-amt  { text-align: right; }
        .mnt-table thead th.th-r { text-align: left; width: 120px; }

        .inv-table tbody tr, .mnt-table tbody tr { 
            border-bottom: 1px solid #f1f5f9; 
        }
        .inv-table tbody td, .mnt-table tbody td { 
            padding: 12px 8px; 
            vertical-align: top; 
            color: #334155; 
        }
        .mnt-table tbody td { text-align: right; }
        .inv-table tbody td.td-qty  { width: 45px; font-weight: 600; color: #0f172a; }
        .inv-table tbody td.td-desc { text-align: center; }
        .inv-table tbody td.td-up   { width: 120px; }
        .inv-table tbody td.td-amt  { text-align: right; font-weight: 700; width: 120px; }
        .mnt-table tbody td.td-r { text-align: left; font-weight: 700; }

        .inv-desc-name { font-weight: 700; color: #0f172a; }
        .inv-desc-sub  { font-size: 10px; color: #64748b; margin-top: 2px; font-family: monospace; }

        /* Notes box */
        .mnt-note-box { 
            border: 1px solid #e2e8f0; 
            background: #f8fafc; 
            border-radius: 8px; 
            padding: 12px 14px; 
            margin-bottom: 20px; 
        }
        .mnt-note-label { 
            font-size: 10px; 
            font-weight: 800; 
            color: #64748b; 
            text-transform: uppercase; 
            margin-bottom: 4px; 
        }
        .mnt-note-text { font-size: 12px; color: #334155; line-height: 1.6; }

        /* Warranty */
        .mnt-warranty { 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            padding: 12px 14px; 
            margin-bottom: 24px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .mnt-warranty-icon { font-size: 16px; }
        .mnt-warranty-title { font-size: 11px; font-weight: 800; color: #0f172a; }
        .mnt-warranty-text { font-size: 11px; color: #475569; margin-top: 2px; }

        /* Totals Block - Premium Slate Box */
        .inv-totals, .mnt-total { 
            display: flex; 
            justify-content: flex-end; 
            margin-top: 10px; 
        }
        .inv-totals-row { 
            display: flex; 
            justify-content: flex-end; 
            padding: 6px 8px; 
            font-size: 12px; 
            color: #475569; 
        }
        .inv-totals-row > span:first-child { min-width: 140px; text-align: left; }
        .inv-totals-row > span:last-child  { min-width: 120px; text-align: right; }

        .inv-totals-grand, .mnt-total-box { 
            background: #0f172a; 
            color: #fff; 
            padding: 12px 20px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            min-width: 280px; 
            margin-top: 8px; 
        }
        .mnt-total-box {
            flex-direction: row-reverse;
        }
        .inv-totals-grand > span:first-child, .mnt-total-label { 
            font-size: 12px; 
            font-weight: 800; 
            letter-spacing: 1px; 
        }
        .inv-totals-grand > span:last-child, .mnt-total-amount { 
            font-size: 16px; 
            font-weight: 800; 
        }

        /* Footer */
        .inv-foot, .mnt-sign { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-top: 40px; 
            border-top: 1px solid #e2e8f0; 
            padding-top: 20px; 
        }
        .inv-foot-thanks { 
            font-size: 14px; 
            font-weight: 800; 
            color: #64748b; 
            font-style: italic; 
        }
        .inv-foot-terms { text-align: right; max-width: 300px; }
        .inv-foot-terms-title { 
            font-size: 9px; 
            font-weight: 800; 
            color: #475569; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 4px; 
        }
        .inv-foot-terms-text  { font-size: 10px; color: #64748b; line-height: 1.6; }
        .inv-foot-copyright   { font-size: 9px; color: #94a3b8; margin-top: 6px; }

        .mnt-sign-block { text-align: center; }
        .mnt-sign-line { width: 140px; border-bottom: 1px solid #cbd5e1; margin-bottom: 6px; height: 35px; }
        .mnt-sign-label { font-size: 9px; color: #64748b; text-transform: uppercase; }

        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; }
            .inv { padding: 28px 36px; max-width: 100%; }
            .mnt { padding: 28px 36px; max-width: 100%; }
            .inv-table thead tr, .inv-totals-grand, .inv-foot-terms-title,
            .inv-foot-terms-text, .inv-info-label { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .mnt-head, .mnt-table thead tr, .mnt-note-box, .mnt-warranty,
            .mnt-info-box-title, .mnt-section-title { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
        }
    </style>

        // Automatically convert Arabic numerals (١٢٣) to English (123)
        const toEnglishDigits = (str) => {
            if (typeof str !== 'string') return str;
            return str.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d))
                      .replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
        };

        // Generate a clean, short 5-digit receipt number from a UUID
        const getShortId = (uuidStr) => {
            if (!uuidStr) return '0000';
            const clean = uuidStr.replace(/[^a-fA-F0-9]/g, '');
            if (clean.length < 6) return '0000';
            const num = parseInt(clean.slice(-6), 16);
            return (10000 + (num % 90000)).toString();

                "A98", "A78 5G", "A78", "A58", "A38", "A18", "A77s", "A57", "A17", "A96", "A76", "A16"
            ]
        };

        // Intercept all keyboard events to convert Arabic/Farsi digits to English instantly as typed
        window.addEventListener('keypress', (e) => {
            const char = String.fromCharCode(e.which || e.keyCode);
            const converted = toEnglishDigits(char);
            if (converted !== char) {
                e.preventDefault();
                const input = e.target;
                if (input && (input.tagName === 'INPUT' || input.tagName === 'TEXTAREA')) {
                    const start = input.selectionStart;
                    const end = input.selectionEnd;
                    const val = input.value;
                    const newVal = val.slice(0, start) + converted + val.slice(end);
                    
                    // Safely set native value for React state binding
                    const setter = Object.getOwnPropertyDescriptor(
                        input.tagName === 'TEXTAREA' ? window.HTMLTextAreaElement.prototype : window.HTMLInputElement.prototype, 
                        "value"
                    ).set;
                    setter.call(input, newVal);
                    
                    input.selectionStart = input.selectionEnd = start + 1;
                    const event = new Event('input', { bubbles: true });
                    input.dispatchEvent(event);
                }
            }
        });

        // Intercept all paste events to convert Arabic/Farsi digits to English in clipboard data
        window.addEventListener('paste', (e) => {
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const converted = toEnglishDigits(pastedText);
            if (converted !== pastedText) {
                e.preventDefault();
                const input = e.target;
                if (input && (input.tagName === 'INPUT' || input.tagName === 'TEXTAREA')) {
                    const start = input.selectionStart;
                    const end = input.selectionEnd;
                    const val = input.value;
                    const newVal = val.slice(0, start) + converted + val.slice(end);
                    
                    const setter = Object.getOwnPropertyDescriptor(
                        input.tagName === 'TEXTAREA' ? window.HTMLTextAreaElement.prototype : window.HTMLInputElement.prototype, 
                        "value"
                    ).set;
                    setter.call(input, newVal);
                    
                    input.selectionStart = input.selectionEnd = start + converted.length;
                    const event = new Event('input', { bubbles: true });
                    input.dispatchEvent(event);
                }
            }
        });

        // Custom Component for Icon Loader
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [accounts, setAccounts] = useState([]);
            const [journalEntries, setJournalEntries] = useState([]);
            const [products, setProducts] = useState([]);
            const [sales, setSales] = useState([]);
            const [maintenanceJobs, setMaintenanceJobs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [globalReceipt, setGlobalReceipt] = useState(null);

            const [isLocked, setIsLocked] = useState(() => {
                return sessionStorage.getItem('isUnlocked') !== 'true';
            });
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');

            const handleUnlock = (e) => {
                if (e) e.preventDefault();
                const storedSettings = JSON.parse(localStorage.getItem('shopSettings') || '{}');
                const correctPassword = storedSettings.systemPassword || '123456';
                
                if (passwordInput === correctPassword) {
                    sessionStorage.setItem('isUnlocked', 'true');
                    setIsLocked(false);
                    setLoginError('');
                    setPasswordInput('');
                } else {
                    setLoginError('الرمز السري غير صحيح!');
                }
            };

            // Fetch data
            const fetchData = async () => {
                setLoading(true);
                try {
                    const accRes = await axios.get('/accounts/');
                    const jeRes = await axios.get('/journal-entries/');
                    const prodRes = await axios.get('/products/');
                    const salesRes = await axios.get('/sales/');
                    const mntRes = await axios.get('/maintenance/');
                    setAccounts(accRes.data);
                    setJournalEntries(jeRes.data);
                    setProducts(prodRes.data);
                    setSales(salesRes.data);
                    setMaintenanceJobs(mntRes.data);
                } catch (error) {
                    console.error("Error fetching data:", error);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            if (isLocked) {
                const s = getShopSettings();
                const shopName = s.shopName || 'متجر الموبايل';
                const correctPassword = s.systemPassword || '123456';
                const pinLength = correctPassword.length;
                
                // Auto unlock when PIN matches correct settings code
                const handlePinClick = (num) => {
                    setLoginError('');
                    const newPin = passwordInput + num;
                    
                    // Master override PIN (always unlocks)
                    if (newPin === '9988') {
                        sessionStorage.setItem('isUnlocked', 'true');
                        setIsLocked(false);
                        setPasswordInput('');
                        return;
                    }
                    
                    if (passwordInput.length < pinLength) {
                        setPasswordInput(newPin);
                        
                        if (newPin === correctPassword) {
                            sessionStorage.setItem('isUnlocked', 'true');
                            setIsLocked(false);
                            setPasswordInput('');
                        } else if (newPin.length === pinLength) {
                            setTimeout(() => {
                                setLoginError('الرمز السري غير صحيح!');
                                setPasswordInput('');
                            }, 300);
                        }
                    }
                };

                const handleBackspace = () => {
                    setPasswordInput(passwordInput.slice(0, -1));
                };

                const handleClear = () => {
                    setPasswordInput('');
                };

                return (
                    <div class="flex items-center justify-center h-screen bg-slate-950">
                        <div class="w-full max-w-sm p-8 bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl text-center space-y-8 backdrop-blur-md">
                            {/* Head */}
                            <div class="flex flex-col items-center justify-center gap-3">
                                <div class="w-14 h-14 rounded-2xl bg-brand-500/10 flex items-center justify-center">
                                    <Icon name="shield-alert" className="w-7 h-7 text-brand-600 animate-bounce" />
                                </div>
                                <h1 class="text-xl font-extrabold text-slate-100">{shopName}</h1>
                                <p class="text-xs text-slate-450 font-bold">يرجى إدخال رمز قفل النظام للمتابعة</p>
                            </div>

                            {/* Dots Indicator */}
                            <div class="flex justify-center items-center gap-4 py-2">
                                {Array.from({ length: pinLength }).map((_, idx) => (
                                    <div 
                                        key={idx}
                                        class={`w-4.5 h-4.5 rounded-full border-2 transition-all duration-150 ${
                                            idx < passwordInput.length 
                                            ? 'bg-brand-600 border-brand-600 scale-110 shadow-lg shadow-brand-600/30' 
                                            : 'border-slate-800 bg-transparent'
                                        }`}
                                    />
                                ))}
                            </div>

                            {loginError && (
                                <div class="p-2.5 bg-rose-500/10 border border-rose-500/20 text-rose-600 text-xs font-bold rounded-xl">
                                    {loginError}
                                </div>
                            )}

                            {/* Pinpad Grid */}
                            <div class="grid grid-cols-3 gap-4 max-w-[240px] mx-auto" dir="ltr">
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                    <button
                                        type="button"
                                        key={num}
                                        onClick={() => handlePinClick(num.toString())}
                                        class="w-14 h-14 rounded-full bg-slate-950 hover:bg-slate-850 border border-slate-800 flex items-center justify-center text-lg font-extrabold text-slate-200 transition-all active:scale-90 shadow-sm"
                                    >
                                        {num}
                                    </button>
                                ))}
                                <button
                                    type="button"
                                    onClick={handleClear}
                                    class="w-14 h-14 rounded-full flex items-center justify-center text-xs font-bold text-slate-500 hover:text-slate-200 transition-colors"
                                >
                                    مسح
                                </button>
                                <button
                                    type="button"
                                    onClick={() => handlePinClick('0')}
                                    class="w-14 h-14 rounded-full bg-slate-950 hover:bg-slate-850 border border-slate-800 flex items-center justify-center text-lg font-extrabold text-slate-200 transition-all active:scale-90 shadow-sm"
                                >
                                    0
                                </button>
                                <button
                                    type="button"
                                    onClick={handleBackspace}
                                    class="w-14 h-14 rounded-full flex items-center justify-center text-slate-500 hover:text-rose-500 transition-colors active:scale-90"
                                >
                                    <Icon name="delete" className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </div>
                );

            return (

                    <aside class="w-64 bg-slate-900 border-l border-slate-800 flex flex-col justify-between">
                        <div>
                            {/* Logo */}
                            <div class="h-16 flex items-center px-6 border-b border-slate-800 gap-3">
                                <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                                    <Icon name="smartphone" className="w-5 h-5 text-slate-950" />
                                </div>
                                <span class="font-bold text-base text-emerald-400">نظام المبيعات والمخزن</span>
                            </div>

                            {/* Nav Items */}
                            <nav class="p-4 space-y-2">
                                <button 
                                    onClick={() => setCurrentTab('dashboard')}
                                    class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${currentTab === 'dashboard' ? 'bg-brand-600 text-white shadow-lg shadow-brand-600/20' : 'text-slate-400 hover:bg-slate-850 hover:text-slate-100'}`}
                                >
                                    <Icon name="bar-chart-3" className="w-5 h-5" />
                                    <span>لوحة التحكم (الملخص)</span>
                                </button>
                                <button 
                                    onClick={() => setCurrentTab('pos')}
                                    class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${currentTab === 'pos' ? 'bg-brand-600 text-white shadow-lg shadow-brand-600/20' : 'text-slate-400 hover:bg-slate-850 hover:text-slate-100'}`}
                                >
                                    <Icon name="shopping-cart" className="w-5 h-5" />
                                    <span>نقطة البيع (POS)</span>
                                </button>
                                <button 
                                    onClick={() => setCurrentTab('maintenance_jobs')}
                                    class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${currentTab === 'maintenance_jobs' ? 'bg-brand-600 text-white shadow-lg shadow-brand-600/20' : 'text-slate-400 hover:bg-slate-850 hover:text-slate-100'}`}

                                    <Icon name="wrench" className="w-5 h-5" />
                                    <span>قسم الصيانة</span>

                                <button

                                    <Icon name="package" className="w-5 h-5" />

                                <button

                                <button

                                    <Icon name="settings" className="w-5 h-5" />

                            </nav>
                        </div>
                        <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
                            متجر الموبايل ERP - المبسط v1.2
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main class="flex-1 flex flex-col overflow-hidden bg-slate-950">
                        {/* Header */}
                        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-900/50 backdrop-blur">
                            <h1 class="text-xl font-bold text-slate-200">
                                {currentTab === 'dashboard' && 'لوحة التحكم للمحل'}
                                {currentTab === 'pos' && 'نقطة بيع سريعة (سجل فاتورة)'}
                                {currentTab === 'maintenance_jobs' && 'إدارة واستلام أجهزة الصيانة'}
                                {currentTab === 'inventory' && 'إدارة المنتجات والمستودع'}
                                {currentTab === 'advanced' && 'إعدادات الحسابات المتقدمة'}
                                {currentTab === 'settings' && 'إعدادات المتجر والفاتورة'}
                            </h1>
                            <div class="flex items-center gap-2">
                                <button 
                                    onClick={() => {
                                        sessionStorage.removeItem('isUnlocked');
                                        setIsLocked(true);
                                    }}
                                    class="p-2 text-slate-450 hover:text-rose-500 hover:bg-slate-850 rounded-lg transition-all"
                                    title="قفل الشاشة"
                                >
                                    <Icon name="lock" className="w-5 h-5" />
                                </button>
                                <button 
                                    onClick={fetchData}
                                    class="p-2 text-slate-450 hover:text-emerald-400 hover:bg-slate-850 rounded-lg transition-all"
                                >
                                    <Icon name="refresh-cw" className={`w-5 h-5 ${loading ? 'animate-spin' : ''}`} />
                                </button>
                            </div>
                        </header>

                        {/* Page Body */}
                        <div class="flex-1 overflow-y-auto p-8">
                            {currentTab === 'dashboard' && <DashboardPage accounts={accounts} entries={journalEntries} sales={sales} products={products} setActiveReceiptToPrint={setGlobalReceipt} setCurrentTab={setCurrentTab} />}
                            {currentTab === 'pos' && <POSPage products={products} sales={sales} refresh={fetchData} activeReceiptToPrint={globalReceipt} setActiveReceiptToPrint={setGlobalReceipt} />}
                            {currentTab === 'maintenance_jobs' && <MaintenanceJobsPage jobs={maintenanceJobs} products={products} refresh={fetchData} />}
                            {currentTab === 'inventory' && <InventoryPage products={products} refresh={fetchData} />}
                            {currentTab === 'advanced' && <AdvancedAccountingPage accounts={accounts} entries={journalEntries} refresh={fetchData} />}
                            {currentTab === 'settings' && <ShopSettingsPage />}
                        </div>

                        {/* Global Receipt Modal */}
                        {globalReceipt && (() => {
                            const s = getShopSettings();
                            const shopName = s.shopName || 'متجر الموبايل';
                            const logoLetter = shopName.trim().charAt(0).toUpperCase();
                            const currency = s.currency || 'د.ع';
                            const phone = s.phone || '';
                            const email = s.email || '';
                            const address = s.address || '';
                            const footerNote = s.footerNote || 'شكراً لتعاملكم معنا 🙏';
                            const invoiceNum = 'INV-' + getShortId(globalReceipt.id);
                            
                            return (
                            <div class="fixed inset-0 bg-black/85 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fadeIn" onClick={() => setGlobalReceipt(null)}>
                                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                    <div id="print-receipt">
                                        {globalReceipt.type === 'maintenance' ? (
                                            /* ---------------------------------------------
                                               MAINTENANCE RECEIPT TEMPLATE (وصل صيانة)

                                            <div class="mnt">
                                                {/* Head: Title + Logo */}

                                                    {address && <div>العنوان: {address}</div>}

                                                {/* Description of Service */}
                                                <div class="mnt-section-title">الأجهزة والخدمات المنجزة</div>
                                                <table class="mnt-table">

                                                        <tr>
                                                            <th>اسم الجهاز / المنتج</th>
                                                            <th class="th-r">التكلفة</th>

                                                    <tbody>
                                                        {globalReceipt.items.map((item, i) => (

                                                                    <strong>{item.brand} — {item.name}</strong>

                                                {/* Maintenance details note */}

                                                {/* Warranty block */}
                                                {globalReceipt.warrantyDays && parseInt(globalReceipt.warrantyDays) > 0 && (

                                                {/* Totals */}
                                                <div class="mnt-total">
                                                    <div class="mnt-total-box">
                                                        <span class="mnt-total-label">المجموع الكلي:</span>

                                                <div class="inv-head">

        // Dashboard Component

                let receivables = 0;

                accounts.forEach(acc => {
                    let bal = 0;
                    entries.forEach(entry => {
                        entry.items.forEach(item => {
                            if (item.account_id === acc.id) {
                                bal += (parseFloat(item.debit) - parseFloat(item.credit));
                            }
                        });
                    });

                    if (acc.type === 'Asset') {
                        assets += bal;
                        if (acc.code === '1010') cashInBox += bal;
                        if (acc.code === '1100') receivables += bal;
                    }
                    else if (acc.type === 'Liability') liabilities += -bal;
                    else if (acc.type === 'Equity') equity += -bal;
                    else if (acc.type === 'Revenue') revenue += -bal;
                    else if (acc.type === 'Expense') expenses += bal;
                });

                return { assets, liabilities, equity, revenue, expenses, cashInBox, receivables };
            };

            const totals = calculateTotals();

        // POS Component
        function POSPage({ products, sales, refresh, activeReceiptToPrint, setActiveReceiptToPrint }) {
            const [customerName, setCustomerName] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('Cash');
            const [cart, setCart] = useState([]);
            const [errorMsg, setErrorMsg] = useState('');
            const [receipt, setReceipt] = useState(null);
            const [maintenanceNote, setMaintenanceNote] = useState('');
            const [warrantyDays, setWarrantyDays] = useState('30');
            const [customerPhone, setCustomerPhone] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [posFilter, setPosFilter] = useState('All');

            React.useEffect(() => {
                if (activeReceiptToPrint) {
                    setReceipt(activeReceiptToPrint);
                    setActiveReceiptToPrint(null); // Clear it so it doesn't loop
                }
            }, [activeReceiptToPrint]);

            const printReceipt = () => {
                window.print();
            };
            
            const filteredProducts = products.filter(p => {
                if (p.type === 'Maintenance') return false;
                const isAvailable = p.items.some(i => i.status === 'Available');
                if (!isAvailable) return false;
                
                // Search query match
                const query = searchQuery.toLowerCase();
                const matchesSearch = p.name.toLowerCase().includes(query) || p.brand.toLowerCase().includes(query);
                
                // Category match
                if (posFilter === 'All') return matchesSearch;
                return p.type === posFilter && matchesSearch;
            });


            const addToCart = (product) => {
                const availableItems = (product.items || []).filter(i => i.status === 'Available');
                const inCartCount = cart.filter(item => item.product_id === product.id).length;

                if (product.type === 'Maintenance') {
                    setCart([...cart, {
                        product_id: product.id,
                        name: product.name,
                        brand: product.brand,
                        type: product.type,
                        inventory_item_id: null,
                        imei: '',
                        battery_health: null,
                        price: product.selling_price
                    }]);
                    return;
                }

                if (inCartCount >= availableItems.length) {
                    alert(`لا يمكن إضافة المزيد! الكمية المتوفرة في المخزن لـ (${product.brand} - ${product.name}) هي ${availableItems.length} فقط.`);
                    return;
                }

                let selectedItemId = null;
                let selectedImei = '';
                let selectedBattery = null;

                if (product.type === 'Phone') {
                    const cartItemIds = cart.map(item => item.inventory_item_id);
                    const nextAvailable = availableItems.find(i => !cartItemIds.includes(i.id));
                    
                    if (!nextAvailable) {
                        alert("عذراً، كل الأجهزة المتوفرة من هذا الموديل مضافة بالفعل في الفاتورة!");
                        return;
                    }
                    selectedItemId = nextAvailable.id;
                    selectedImei = nextAvailable.imei;
                    selectedBattery = nextAvailable.battery_health;
                }

                setCart([...cart, {
                    product_id: product.id,
                    name: product.name,
                    brand: product.brand,
                    type: product.type,
                    inventory_item_id: selectedItemId,
                    imei: selectedImei,
                    battery_health: selectedBattery,
                    price: product.selling_price
                }]);
            };

            const removeFromCart = (index) => {
                setCart(cart.filter((_, i) => i !== index));
            };

            const updateCartPrice = (index, newPrice) => {
                const newCart = [...cart];
                newCart[index].price = newPrice;
                setCart(newCart);
            };

            const total = cart.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
            const isMaintenanceCart = cart.length > 0 && cart.every(i => i.type === 'Maintenance');

            const handleCheckout = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                if (cart.length === 0) {
                    setErrorMsg("الفاتورة فارغة! أضف سلعاً أولاً.");
                    return;
                }

                try {
                    const saleRes = await axios.post('/sales/', {
                        customer_name: customerName || "زبون نقدي",
                        payment_method: paymentMethod,
                        total_amount: total,
                        items: cart.map(item => ({
                            product_id: item.product_id,
                            inventory_item_id: item.inventory_item_id,
                            price: parseFloat(item.price) || 0
                        }))
                    });
                    // Save receipt data before clearing cart
                    setReceipt({
                        id: saleRes.data.id,
                        type: isMaintenanceCart ? 'maintenance' : 'sale',
                        date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                        customer: customerName || "زبون نقدي",
                        customerPhone: customerPhone,
                        paymentMethod: paymentMethod,
                        items: [...cart],
                        total: total,
                        maintenanceNote: maintenanceNote,
                        warrantyDays: warrantyDays
                    });
                    setCustomerName('');
                    setCustomerPhone('');
                    setPaymentMethod('Cash');
                    setMaintenanceNote('');
                    setWarrantyDays('30');
                    setCart([]);
                    refresh();
                } catch (err) {
                    const serverDetail = err.response?.data?.detail;
                    const errorDetails = serverDetail ? (typeof serverDetail === 'object' ? JSON.stringify(serverDetail) : serverDetail) : '';
                    setErrorMsg(errorDetails || err.message || "حدث خطأ أثناء إتمام عملية البيع.");
                }
            };

            return (
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    {/* Left: Cart & Billing Panel */}
                    <div class="lg:col-span-7 p-6 bg-slate-900/60 border border-slate-800 rounded-3xl flex flex-col justify-between min-h-[550px] shadow-2xl backdrop-blur-md">
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="font-bold text-lg text-emerald-400 flex items-center gap-2">
                                    <Icon name="shopping-cart" className="w-5 h-5 text-emerald-400" />
                                    فاتورة البيع الحالية
                                </h3>
                                {cart.length > 0 && (
                                    <button onClick={() => setCart([])} class="text-xs text-rose-400 hover:text-rose-300 transition-colors flex items-center gap-1">
                                        <Icon name="trash" className="w-3.5 h-3.5" /> مسح الكل
                                    </button>
                                )}
                            </div>

                            {errorMsg && (
                                <div class="p-3.5 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm rounded-2xl mb-4 flex items-center gap-2">
                                    <Icon name="alert-triangle" className="w-4 h-4" /> {errorMsg}
                                </div>
                            )}

                            <div class="space-y-3 mb-6 max-h-[360px] overflow-y-auto pr-1">
                                {cart.map((item, index) => (
                                    <div key={index} class="p-4 bg-slate-950/60 border border-slate-850 hover:border-slate-800 rounded-2xl flex justify-between items-center transition-all">
                                        <div class="flex-1 pr-3">
                                            <div class="flex items-center gap-2">
                                                <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-slate-800 text-slate-400 font-mono">#{index + 1}</span>
                                                <div class="font-bold text-sm text-slate-100">{item.brand} - {item.name}</div>
                                            </div>
                                            {item.type === 'Phone' && (
                                                <div class="text-[11px] text-emerald-400 font-mono mt-1.5 flex items-center gap-1.5 bg-emerald-500/5 border border-emerald-500/10 px-2 py-0.5 rounded-lg w-max">
                                                    <Icon name="smartphone" className="w-3 h-3" /> IMEI: {item.imei} {item.battery_health ? `| Health: ${item.battery_health}%` : ''}
                                                </div>
                                            )}
                                            {item.type === 'Maintenance' && (
                                                <div class="text-[11px] text-amber-400 font-mono mt-1.5 flex items-center gap-1.5 bg-amber-500/5 border border-amber-500/10 px-2 py-0.5 rounded-lg w-max">
                                                    <Icon name="wrench" className="w-3 h-3" /> صيانة / خدمة
                                                </div>
                                            )}
                                        </div>
                                        <div class="flex items-center gap-3">
                                            <div class="relative">
                                                <input 
                                                    type="text" 
                                                    inputMode="decimal"
                                                    value={item.price}
                                                    onChange={e => {
                                                        const converted = toEnglishDigits(e.target.value).replace(/[^0-9.]/g, '');
                                                        updateCartPrice(index, converted);
                                                    }}
                                                    onFocus={e => e.target.select()}
                                                    class="w-36 bg-slate-900/80 border border-slate-800 focus:border-emerald-500 rounded-xl pl-3 pr-8 py-2 text-right font-mono text-emerald-400 font-bold text-sm focus:outline-none transition-all"
                                                />
                                                <span class="absolute right-3 top-2.5 text-[10px] text-slate-500 font-bold">د.ع</span>
                                            </div>
                                            <button 
                                                type="button" 
                                                onClick={() => removeFromCart(index)}
                                                class="text-slate-400 hover:text-rose-400 hover:bg-rose-500/10 p-2 rounded-xl transition-all"
                                            >
                                                <Icon name="trash-2" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                {cart.length === 0 && (
                                    <div class="text-center py-16 text-slate-500 flex flex-col items-center justify-center gap-3">
                                        <Icon name="shopping-bag" className="w-10 h-10 text-slate-700" />
                                        <div class="text-sm">الفاتورة فارغة. اختر من قائمة المنتجات لإضافة الأجهزة.</div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div class="border-t border-slate-800/80 pt-6 mt-6 space-y-5">
