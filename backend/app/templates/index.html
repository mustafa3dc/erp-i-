        // Inventory Component
        function InventoryPage({ products, refresh }) {
            const [name, setName] = useState('');
            const [compatibleDevice, setCompatibleDevice] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('Apple');
            const [customBrand, setCustomBrand] = useState('');
            const [type, setType] = useState('Phone');
            const [purchasePrice, setPurchasePrice] = useState('');
            const [sellingPrice, setSellingPrice] = useState('');
            const [imeisInput, setImeisInput] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            const [activeCategory, setActiveCategory] = useState('Phone');
            const [searchQuery, setSearchQuery] = useState('');
            const [quantity, setQuantity] = useState('1');
            const [batteryHealth, setBatteryHealth] = useState('');
            const [showSoldItems, setShowSoldItems] = useState(false);
            const [purchaseList, setPurchaseList] = useState([]);
            const [isSavingList, setIsSavingList] = useState(false);
            const [selectedParts, setSelectedParts] = useState({});
            const [customPartInput, setCustomPartInput] = useState('');

            // Charger specs states
            const [isChargerSpec, setIsChargerSpec] = useState(false);
            const [chargerWatts, setChargerWatts] = useState('');
            const [cableLength, setCableLength] = useState('');
            const [boxContents, setBoxContents] = useState('both');

            const defaultPhoneBrands = ["Apple", "Samsung", "Xiaomi", "Huawei", "Realme", "Infinix", "Honor", "Oppo"];
            const defaultAccessoryBrands = ["Anker", "Joyroom", "LDNIO", "Baseus", "Remax", "Yesido", "Hoco", "Oraimo", "Apple", "Samsung", "Xiaomi", "Green Lion", "McDodo", "Awei", "G-Tab", "Pavareal"];

            const existingPhoneBrands = products.filter(p => p.type === 'Phone' || p.type === 'Maintenance').map(p => p.brand);
            const existingAccessoryBrands = products.filter(p => p.type === 'Accessory').map(p => p.brand);

            const PHONE_BRANDS = [...new Set([...defaultPhoneBrands, ...existingPhoneBrands])].filter(b => b && b !== 'أخرى');
            PHONE_BRANDS.push('أخرى');

            const ACCESSORY_BRANDS = [...new Set([...defaultAccessoryBrands, ...existingAccessoryBrands])].filter(b => b && b !== 'أخرى');
            ACCESSORY_BRANDS.push('أخرى');

            // Sync product type state and default brand with the active category tab
            useEffect(() => {
                setType(activeCategory);
                if (activeCategory === 'Accessory') {
                    setSelectedBrand('Anker');
                } else {
                    setSelectedBrand('Apple');
                }
            }, [activeCategory]);

            const handleAddToList = (e) => {
                e.preventDefault();
                setErrorMsg('');
                
                const finalBrand = selectedBrand === 'أخرى' ? customBrand.trim() : selectedBrand;
                if (!finalBrand) {
                    setErrorMsg("يرجى تحديد أو كتابة اسم الشركة المصنعة.");
                    return;
                }

                let finalName = name.trim();
                if (activeCategory === 'Maintenance' && compatibleDevice.trim()) {
                    finalName = `${finalName} (${compatibleDevice.trim()})`;
                }

                if (activeCategory === 'Accessory' && isChargerSpec) {
                    const specs = [];
                    if (chargerWatts.trim()) specs.push(`${chargerWatts.trim()}W`);
                    if (cableLength.trim()) specs.push(`طول ${cableLength.trim()}م`);
                    
                    let contentsText = '';
                    if (boxContents === 'both') contentsText = 'شاحن مع كيبل';
                    else if (boxContents === 'adapter') contentsText = 'شاحن فقط';
                    else if (boxContents === 'cable') contentsText = 'كيبل فقط';
                    
                    if (contentsText) specs.push(contentsText);
                    
                    if (specs.length > 0) {
                        finalName = `${finalName} (${specs.join(' - ')})`;
                    }
                }

                const imeis = imeisInput.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0);

                const newItem = {
                    name: finalName,
                    brand: finalBrand,
                    type: activeCategory,
                    purchase_price: parseFloat(purchasePrice) || 0,
                    selling_price: parseFloat(sellingPrice) || 0,
                    imeis: activeCategory === 'Phone' ? imeis : null,
                    quantity: activeCategory === 'Phone' ? 1 : parseInt(quantity) || 1,
                    battery_health: (activeCategory === 'Phone' && selectedBrand === 'Apple' && batteryHealth) ? parseInt(batteryHealth) : null,
                    displayName: name.trim(),
                    displayDevice: compatibleDevice.trim()
                };

                setPurchaseList([...purchaseList, newItem]);

                // Reset only specific fields to allow quick adding for same device/brand
                setName('');
                setPurchasePrice('');
                setSellingPrice('');
                setImeisInput('');
                setQuantity('1');
                setBatteryHealth('');
                setIsChargerSpec(false);
                setChargerWatts('');
                setCableLength('');
                setBoxContents('both');
            };

            const handleSaveEntireList = async () => {
                if (purchaseList.length === 0) return;
                setIsSavingList(true);
                setErrorMsg('');
                try {
                    for (const item of purchaseList) {
                        await axios.post('/products/', {
                            name: item.name,
                            brand: item.brand,
                            type: item.type,
                            purchase_price: item.purchase_price,
                            selling_price: item.selling_price,
                            imeis: item.imeis,
                            quantity: item.quantity,
                            battery_health: item.battery_health
                        });
                    }
                    setPurchaseList([]);
                    setCompatibleDevice('');
                    setCustomBrand('');
                    refresh();
                    alert("تم تنزيل قائمة المواد بالكامل إلى المخزن بنجاح! 🎉");
                } catch (err) {
                    setErrorMsg("حدث خطأ أثناء تنزيل بعض المواد. يرجى المحاولة مرة أخرى.");
                } finally {
                    setIsSavingList(false);
                }
            };

            const handleCreateProduct = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                
                const finalBrand = selectedBrand === 'أخرى' ? customBrand.trim() : selectedBrand;
                if (!finalBrand) {
                    setErrorMsg("يرجى تحديد أو كتابة اسم الشركة المصنعة.");
                    return;
                }

                try {
                    if (activeCategory === 'Maintenance') {
                        const partNames = Object.keys(selectedParts);
                        if (partNames.length === 0) {
                            setErrorMsg("يرجى اختيار قطعة صيانة واحدة على الأقل وتعبئة معلوماتها.");
                            return;
                        }
                        if (!compatibleDevice.trim()) {
                            setErrorMsg("يرجى كتابة موديل الجهاز المتوافق.");
                            return;
                        }

                        for (const partName of partNames) {
                            const pData = selectedParts[partName];
                            const finalName = `${partName} (${compatibleDevice.trim()})`;
                            await axios.post('/products/', {
                                name: finalName,
                                brand: finalBrand,
                                type: 'Maintenance',
                                purchase_price: parseFloat(pData.purchasePrice) || 0,
                                selling_price: parseFloat(pData.sellingPrice) || 0,
                                imeis: null,
                                quantity: parseInt(pData.quantity) || 1,
                                battery_health: null
                            });
                        }
                        
                        setSelectedParts({});
                        setCompatibleDevice('');
                    } else {
                        let finalName = name.trim();
                        if (activeCategory === 'Accessory' && isChargerSpec) {
                            const specs = [];
                            if (chargerWatts.trim()) specs.push(`${chargerWatts.trim()}W`);
                            if (cableLength.trim()) specs.push(`طول ${cableLength.trim()}م`);
                            
                            let contentsText = '';
                            if (boxContents === 'both') contentsText = 'شاحن مع كيبل';
                            else if (boxContents === 'adapter') contentsText = 'شاحن فقط';
                            else if (boxContents === 'cable') contentsText = 'كيبل فقط';
                            
                            if (contentsText) specs.push(contentsText);
                            
                            if (specs.length > 0) {
                                finalName = `${finalName} (${specs.join(' - ')})`;
                            }
                        }

                        const imeis = imeisInput.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0);

                        await axios.post('/products/', {
                            name: finalName,
                            brand: finalBrand,
                            type: activeCategory,
                            purchase_price: parseFloat(purchasePrice) || 0,
                            selling_price: parseFloat(sellingPrice) || 0,
                            imeis: activeCategory === 'Phone' ? imeis : null,
                            quantity: activeCategory === 'Phone' ? 1 : parseInt(quantity) || 1,
                            battery_health: (activeCategory === 'Phone' && selectedBrand === 'Apple' && batteryHealth) ? parseInt(batteryHealth) : null
                        });
                        
                        setName('');
                        setPurchasePrice('');
                        setSellingPrice('');
                        setImeisInput('');
                        setQuantity('1');
                        setBatteryHealth('');
                        setIsChargerSpec(false);
                        setChargerWatts('');
                        setCableLength('');
                        setBoxContents('both');
                    }
                    
                    setCustomBrand('');
                    refresh();
                    alert("تم حفظ وتنزيل المواد بالمخزن بنجاح! 🎉");
                } catch (err) {
                    setErrorMsg(err.response?.data?.detail || "حدث خطأ أثناء إضافة البضاعة.");
                }
            };

            return (
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    {/* Left Column: Form dynamically adapted to the active tab */}
                    <div class="space-y-6">
                        <div class="p-6 bg-slate-900 border border-slate-800 rounded-2xl h-fit">
                        <h3 class="font-bold text-lg mb-6 text-emerald-400">
                            {activeCategory === 'Phone' && "شراء وتنزيل أجهزة موبايل"}
                            {activeCategory === 'Accessory' && "شراء وتنزيل إكسسوارات"}
                            {activeCategory === 'Maintenance' && "شراء وتنزيل قطع صيانة"}
                        </h3>
                        <form onSubmit={handleCreateProduct} class="space-y-4">
                            {errorMsg && (
                                <div class="p-3 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm rounded-xl">
                                    {errorMsg}
                                </div>
                            )}
                            <div>
                                <label class="block text-sm text-slate-400 mb-1">الشركة المصنعة (Brand)</label>
                                <select 
                                    value={selectedBrand}
                                    onChange={e => setSelectedBrand(e.target.value)}
                                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-slate-100 mb-2"
                                >
                                    {(activeCategory === 'Accessory' ? ACCESSORY_BRANDS : PHONE_BRANDS).map(b => (
                                        <option key={b} value={b}>{b}</option>
                                    ))}
                                </select>
                                {selectedBrand === 'أخرى' && (
                                    <input 
                                        type="text" 
                                        required
                                        value={customBrand}
                                        onChange={e => setCustomBrand(e.target.value)}
                                        placeholder="اكتب اسم الشركة هنا"
                                        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-slate-100"
                                    />
                                )}
                            </div>

                            {activeCategory === 'Maintenance' ? (
                                /* =============================================
                                   MAINTENANCE: MULTI-PART SELECTOR VIEW (بدون هوسة)
                                   ============================================= */
                                <div class="space-y-4">
                                    {/* Compatible Device */}
                                    <div>
                                         <label class="block text-sm text-slate-400 mb-1">موديل الجهاز المتوافق *</label>
                                         <input 
                                             type="text" 
                                             required
                                             value={compatibleDevice}
                                             onChange={e => setCompatibleDevice(e.target.value)}
                                             list="inventory-device-models"
                                             placeholder="مثال: iPhone 11"
                                             class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-slate-100"
                                         />
                                         <datalist id="inventory-device-models">
                                             {(BRAND_MODELS[selectedBrand] || []).map(m => (
                                                 <option key={m} value={m} />
                                             ))}
                                         </datalist>
                                    </div>

                                    {/* Toggle Buttons */}
                                    <div>
                                         <label class="block text-sm text-slate-400 mb-1.5 font-bold text-sky-400">اختر قطع الصيانة المطلوبة (يمكن تحديد أكثر من قطعة) *</label>
                                         <div class="flex flex-wrap gap-1.5 mb-3">
                                             {["شاشة", "بطارية", "كفر خلفي", "منفذ شحن", "كاميرا خلفية", "كاميرا أمامية", "فلاتة شحن", "سماعة"].map(partType => {
                                                 const isSelected = !!selectedParts[partType];
                                                 return (
                                                     <button
                                                         type="button"
                                                         key={partType}
                                                         onClick={() => {
                                                             const updated = { ...selectedParts };
                                                             if (updated[partType]) {
                                                                 delete updated[partType];
                                                             } else {
                                                                 updated[partType] = { purchasePrice: '', sellingPrice: '', quantity: '1' };
                                                             }
                                                             setSelectedParts(updated);
                                                         }}
                                                         class={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all border ${
                                                             isSelected 
                                                             ? 'bg-emerald-500/10 text-emerald-500 border-emerald-500/20 shadow-sm' 
                                                             : 'bg-slate-950 text-slate-450 border-slate-800 hover:text-slate-200'
                                                         }`}
                                                     >
                                                         {partType} {isSelected ? '✓' : ''}
                                                     </button>
                                                 );
                                             })}
                                         </div>

                                         {/* Add custom part field */}
                                         <div class="flex gap-2">
                                             <input 
                                                 type="text" 
                                                 value={customPartInput} 
                                                 onChange={e => setCustomPartInput(e.target.value)} 
                                                 placeholder="إضافة قطعة صيانة أخرى..." 
                                                 class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-emerald-500"
                                             />
                                             <button 
                                                 type="button" 
                                                 onClick={() => {
                                                     if (!customPartInput.trim()) return;
                                                     const part = customPartInput.trim();
                                                     const updated = { ...selectedParts };
                                                     if (!updated[part]) {
                                                         updated[part] = { purchasePrice: '', sellingPrice: '', quantity: '1' };
                                                         setSelectedParts(updated);
                                                     }
                                                     setCustomPartInput('');
                                                 }}
                                                 class="px-3 bg-slate-800 hover:bg-slate-755 text-emerald-400 font-bold rounded-xl text-xs transition-all"
                                             >
                                                 إضافة
                                             </button>
                                         </div>
                                    </div>

                                    {/* Dynamically opened input fields for each selected part */}
                                    <div class="space-y-3">
                                         {Object.keys(selectedParts).map(partName => {
                                             const partData = selectedParts[partName];
                                             return (
                                                 <div key={partName} class="p-4 bg-slate-950/60 border border-slate-850 rounded-2xl space-y-3">
                                                     <div class="flex justify-between items-center">
                                                         <span class="text-xs font-bold text-emerald-400 flex items-center gap-1">🛠️ {partName}</span>
                                                         <button 
                                                             type="button" 
                                                             onClick={() => {
                                                                 const updated = { ...selectedParts };
                                                                 delete updated[partName];
                                                                 setSelectedParts(updated);
                                                             }} 
                                                             class="text-[10px] text-rose-450 hover:text-rose-400"
                                                         >
                                                             إلغاء القطعة
                                                         </button>
                                                     </div>
                                                     <div class="grid grid-cols-3 gap-2">
                                                         <div>
                                                             <label class="block text-[10px] text-slate-500 mb-1">سعر الشراء</label>
                                                             <input 
                                                                 type="text" 
                                                                 inputMode="decimal"
                                                                 required
                                                                 placeholder="0" 
                                                                 value={partData.purchasePrice} 
                                                                 onChange={e => {
                                                                     const val = toEnglishDigits(e.target.value).replace(/[^0-9.]/g, '');
                                                                     const updated = { ...selectedParts };
                                                                     updated[partName].purchasePrice = val;
                                                                     setSelectedParts(updated);
                                                                 }}
                                                                 class="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-right text-emerald-400 font-mono focus:outline-none focus:border-emerald-500" 
                                                             />
                                                         </div>
                                                         <div>
                                                             <label class="block text-[10px] text-slate-500 mb-1">سعر البيع</label>
                                                             <input 
                                                                 type="text" 
                                                                 inputMode="decimal"
                                                                 required
                                                                 placeholder="0" 
                                                                 value={partData.sellingPrice} 
                                                                 onChange={e => {
                                                                     const val = toEnglishDigits(e.target.value).replace(/[^0-9.]/g, '');
                                                                     const updated = { ...selectedParts };
                                                                     updated[partName].sellingPrice = val;
                                                                     setSelectedParts(updated);
                                                                 }}
                                                                 class="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-right text-sky-400 font-mono focus:outline-none focus:border-emerald-500" 
                                                             />
                                                         </div>
                                                         <div>
                                                             <label class="block text-[10px] text-slate-500 mb-1">الكمية</label>
                                                             <input 
                                                                 type="text" 
                                                                 inputMode="numeric"
                                                                 required
                                                                 value={partData.quantity} 
                                                                 onChange={e => {
                                                                     const val = toEnglishDigits(e.target.value).replace(/[^0-9]/g, '');
                                                                     const updated = { ...selectedParts };
                                                                     updated[partName].quantity = val;
                                                                     setSelectedParts(updated);
                                                                 }}
                                                                 class="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-center text-slate-200 focus:outline-none focus:border-emerald-500" 
                                                             />
                                                         </div>
                                                     </div>
                                                 </div>
                                             );
                                         })}
                                    </div>
                                </div>
                            ) : (
                                /* =============================================
                                   PHONES / ACCESSORIES: STANDARD SINGLE-ITEM VIEW
                                   ============================================= */
                                <div class="space-y-4">
                                    <div>
                                         <label class="block text-sm text-slate-400 mb-1">
                                             {activeCategory === 'Phone' && "اسم الجهاز والموديل"}
                                             {activeCategory === 'Accessory' && "اسم الإكسسوار"}
                                         </label>
                                         <input 
                                             type="text" 
                                             required
                                             value={name}
                                             onChange={e => setName(e.target.value)}
                                             list={activeCategory === 'Phone' ? "inventory-device-models" : undefined}
                                             placeholder={
                                                 activeCategory === 'Phone' ? "مثال: iPhone 15 Pro Max" : "مثال: شاحن سريع 20W"
                                             }
                                             class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-slate-100"
                                         />
                                         {activeCategory === 'Phone' && (
                                             <datalist id="inventory-device-models">
                                                 {(BRAND_MODELS[selectedBrand] || []).map(m => (
                                                     <option key={m} value={m} />
                                                 ))}
                                             </datalist>
                                         )}
                                    </div>
                                     {activeCategory === 'Accessory' && (
                                         <div class="p-4 bg-slate-950/60 border border-slate-850 rounded-2xl space-y-4 mb-4">
                                             <label class="flex items-center gap-2 cursor-pointer select-none">
                                                 <input 
                                                     type="checkbox" 
                                                     checked={isChargerSpec} 
                                                     onChange={e => setIsChargerSpec(e.target.checked)} 
                                                     class="w-4 h-4 rounded border-slate-800 text-emerald-500 focus:ring-0 focus:ring-offset-0 bg-slate-950"
                                                 />
                                                 <span class="text-xs font-bold text-slate-350">تخصيص مواصفات الشاحن / الكيبل (واط، طول، نوع)</span>
                                             </label>

                                             {isChargerSpec && (
                                                 <div class="grid grid-cols-1 gap-3 pt-2 border-t border-slate-900">
                                                     <div class="grid grid-cols-2 gap-2">
                                                         <div>
                                                             <label class="block text-[10px] text-slate-500 mb-1">القدرة بالواط (Watts)</label>
                                                             <input 
                                                                 type="text" 
                                                                 placeholder="مثال: 20" 
                                                                 value={chargerWatts} 
                                                                 onChange={e => setChargerWatts(toEnglishDigits(e.target.value).replace(/[^0-9]/g, ''))}
                                                                 class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-center text-slate-200 focus:outline-none focus:border-emerald-500"
                                                             />
                                                         </div>
                                                         <div>
                                                             <label class="block text-[10px] text-slate-500 mb-1">طول الكيبل (متر)</label>
                                                             <input 
                                                                 type="text" 
                                                                 placeholder="مثال: 1 أو 1.5" 
                                                                 value={cableLength} 
                                                                 onChange={e => setCableLength(e.target.value)}
                                                                 class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-center text-slate-200 focus:outline-none focus:border-emerald-500"
                                                             />
                                                         </div>
                                                     </div>
                                                     <div>
                                                         <label class="block text-[10px] text-slate-500 mb-1.5">نوع المنتج / المحتويات</label>
                                                         <div class="grid grid-cols-3 gap-1">
                                                             {[
                                                                 { key: 'both', label: 'شاحن مع كيبل' },
                                                                 { key: 'adapter', label: 'شاحن فقط' },
                                                                 { key: 'cable', label: 'كيبل فقط' }
                                                             ].map(opt => (
                                                                 <button
                                                                     type="button"
                                                                     key={opt.key}
                                                                     onClick={() => setBoxContents(opt.key)}
                                                                     class={`py-1.5 rounded-lg text-[10px] font-bold border transition-all ${
                                                                         boxContents === opt.key 
                                                                         ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' 
                                                                         : 'bg-slate-900 text-slate-450 border-transparent hover:text-slate-200'
                                                                     }`}
                                                                 >
                                                                     {opt.label}
                                                                 </button>
                                                             ))}
                                                         </div>
                                                     </div>
                                                 </div>
                                             )}
                                         </div>
                                     )}
                                    <div>
                                         <label class="block text-sm text-slate-400 mb-1">سعر الشراء (التكلفة للقطعة)</label>
                                         <input 
                                             type="text" 
                                             inputMode="decimal"
                                             required
                                             placeholder="0.00"
                                             value={purchasePrice}
                                             onChange={e => {
                                                 const converted = toEnglishDigits(e.target.value).replace(/[^0-9.]/g, '');
                                                 setPurchasePrice(converted);
                                             }}
                                             onFocus={e => e.target.select()}
                                             class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-slate-100 text-right font-mono"
                                         />
                                    </div>
                                    <div>
                                         <label class="block text-sm text-slate-400 mb-1">سعر البيع المقترح</label>
                                         <input 
                                             type="text" 
                                             inputMode="decimal"
                                             required
                                             placeholder="0.00"
                                             value={sellingPrice}
                                             onChange={e => {
                                                 const converted = toEnglishDigits(e.target.value).replace(/[^0-9.]/g, '');
                                                 setSellingPrice(converted);
                                             }}
                                             onFocus={e => e.target.select()}
                                             class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-slate-100 text-right font-mono"
                                         />
                                    </div>
                                    {activeCategory !== 'Phone' && (
                                         <div>
                                             <label class="block text-sm text-slate-400 mb-1">الكمية المشتراة (عدد القطع)</label>
                                             <input 
                                                 type="text" 
                                                 inputMode="numeric"
                                                 required
                                                 value={quantity}
                                                 onChange={e => {
                                                     const converted = toEnglishDigits(e.target.value).replace(/[^0-9]/g, '');
                                                     setQuantity(converted);
                                                 }}
                                                 onFocus={e => e.target.select()}
                                                 class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-slate-100 text-right font-mono"
                                             />
                                         </div>
                                    )}
                                    {activeCategory === 'Phone' && (
                                         <div>
                                             <label class="block text-sm text-slate-400 mb-1">أرقام الـ IMEI (رقم لكل جهاز في سطر)</label>
                                             <textarea 
                                                 rows="3"
                                                 required
                                                 value={imeisInput}
                                                 onChange={e => setImeisInput(e.target.value)}
                                                 placeholder="أدخل أرقام التسلسلي هنا"
                                                 class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-550 text-slate-100 font-mono text-xs"
                                             ></textarea>
                                         </div>
                                    )}
                                    {activeCategory === 'Phone' && selectedBrand === 'Apple' && (
                                         <div>
                                             <label class="block text-sm text-slate-400 mb-1">نسبة صحة البطارية (%)</label>
                                             <input 
                                                 type="text" 
                                                 inputMode="numeric"
                                                 placeholder="مثال: 85"
                                                 value={batteryHealth}
                                                 onChange={e => {
                                                     const converted = toEnglishDigits(e.target.value).replace(/[^0-9]/g, '');
                                                     setBatteryHealth(converted);
                                                 }}
                                                 onFocus={e => e.target.select()}
                                                 class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-slate-100 text-right font-mono"
                                             />
                                         </div>
                                    )}
                                </div>
                            )}

                            {/* Submit Buttons */}
                            {activeCategory === 'Maintenance' ? (
                                <button 
                                    type="submit"
                                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2"
                                >
                                    <Icon name="plus-circle" className="w-5 h-5" />
                                    <span>حفظ وتنزيل قطع الصيانة للمخزن 📥</span>
                                </button>
                            ) : (
                                <div class="grid grid-cols-2 gap-3">
                                    <button 
                                        type="button"
                                        onClick={handleAddToList}
                                        class="bg-slate-950 hover:bg-slate-850 text-slate-200 border border-slate-800 font-bold py-3 rounded-xl transition-all text-xs flex items-center justify-center gap-1.5 shadow-md"
                                    >
                                        <Icon name="plus-circle" className="w-4 h-4 text-emerald-400" />
                                        <span>إضافة للقائمة</span>
                                    </button>
                                    <button 
                                        type="submit"
                                        class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all text-xs flex items-center justify-center gap-1.5 shadow-md"
                                    >
                                        <Icon name="zap" className="w-4 h-4 text-white" />
                                        <span>تنزيل مباشر</span>
                                    </button>
                                </div>
                            )}

                    {/* Temporary Purchase List Card */}
                    {purchaseList.length > 0 && (
                        <div class="p-5 bg-slate-900 border border-slate-800 rounded-2xl shadow-xl space-y-4">
                            <div class="flex justify-between items-center">
                                <h4 class="font-bold text-xs text-emerald-400 flex items-center gap-1.5">
                                    📋 قائمة تنزيل البضاعة المؤقتة ({purchaseList.length})
                                </h4>
                                <button onClick={() => setPurchaseList([])} class="text-[10px] text-rose-400 hover:text-rose-300 transition-colors">
                                    إلغاء الكل
                                </button>
                            </div>
                            
                            <div class="space-y-2 max-h-[220px] overflow-y-auto pr-1">
                                {purchaseList.map((item, idx) => (
                                    <div key={idx} class="p-2.5 bg-slate-950 border border-slate-850 rounded-xl flex justify-between items-center text-xs">
                                        <div class="space-y-0.5">
                                            <div class="font-bold text-slate-200">{item.brand} - {item.displayName}</div>
                                            {item.displayDevice && <div class="text-[10px] text-slate-500">لجهاز: {item.displayDevice}</div>}
                                            <div class="text-[10px] text-slate-400 font-mono">العدد: {item.quantity} | التكلفة للقطعة: {item.purchase_price.toLocaleString()} د.ع</div>
                                        </div>
                                        <button 
                                            type="button"
                                            onClick={() => setPurchaseList(purchaseList.filter((_, i) => i !== idx))} 
                                            class="p-1 text-slate-500 hover:text-rose-400 transition-colors text-xs"
                                        >
                                            ✕
                                        </button>
                                    </div>

        // Maintenance Jobs tracker page
        function MaintenanceJobsPage({ jobs, products = [], refresh }) {
            const [customerName, setCustomerName] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [deviceModel, setDeviceModel] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('Apple');
            const [imei, setImei] = useState('');
            const [problem, setProblem] = useState('');
            const [cost, setCost] = useState('');
            const [warrantyDays, setWarrantyDays] = useState('30');
            const [usedProductId, setUsedProductId] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            const [activeTab, setActiveTab] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [showAddForm, setShowAddForm] = useState(false);
            const [receipt, setReceipt] = useState(null);

            const handleCreateJob = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                if (!customerName || !deviceModel) {
                    setErrorMsg("يرجى ملء الحقول الإلزامية (الاسم، والموديل).");
                    return;
                }

                try {
                    const finalDeviceModel = `${selectedBrand} - ${deviceModel.trim()}`;
                    await axios.post('/maintenance/', {
                        customer_name: customerName,
                        customer_phone: customerPhone || null,
                        device_model: finalDeviceModel,
                        imei: imei || null,
                        problem_description: problem || null,
                        cost: parseFloat(cost) || 0,
                        status: "Under Inspection",
                        warranty_days: parseInt(warrantyDays) || 30,
                        used_product_id: usedProductId || null
                    });
                    // Reset
                    setCustomerName('');
                    setCustomerPhone('');
                    setDeviceModel('');
                    setImei('');
                    setProblem('');
                    setCost('');
                    setWarrantyDays('30');
                    setUsedProductId('');
                    setShowAddForm(false);
                    refresh();
                } catch (err) {
                    setErrorMsg(err.response?.data?.detail || "حدث خطأ أثناء حفظ جهاز الصيانة.");
                }
            };

            const handleUpdateStatus = async (jobId, currentStatus, currentCost) => {
                let nextStatus = "Under Inspection";
                if (currentStatus === "Under Inspection") nextStatus = "Repaired";
                else if (currentStatus === "Repaired") nextStatus = "Delivered";
                
                try {
                    const res = await axios.put(`/maintenance/${jobId}/`, {
                        status: nextStatus,
                        cost: parseFloat(currentCost) || 0
                    });
                    refresh();
                    
                    // If transitioned to Delivered, show receipt!
                    if (nextStatus === "Delivered") {
                        const s = getShopSettings();
                        setReceipt({
                            id: res.data.id,
                            type: 'maintenance',
                            date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                            customer: res.data.customer_name,
                            customerPhone: res.data.customer_phone,
                            paymentMethod: 'Cash',
                            items: [{
                                brand: 'صيانة جهاز',
                                name: res.data.device_model,
                                imei: res.data.imei,
                                price: res.data.cost
                            }],
                            total: res.data.cost,
                            maintenanceNote: res.data.problem_description,
                            warrantyDays: res.data.warranty_days
                        });
                    }
                } catch (e) {
                    alert("حدث خطأ أثناء تحديث حالة جهاز الصيانة.");
                }
            };

            const printReceipt = () => {
                window.print();
            };

            const filteredJobs = jobs.filter(job => {
                const matchesTab = activeTab === 'All' || job.status === activeTab;
                const matchesSearch = 
                    job.customer_name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    job.device_model.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    (job.imei && job.imei.toLowerCase().includes(searchQuery.toLowerCase())) ||
                    (job.customer_phone && job.customer_phone.includes(searchQuery));
                return matchesTab && matchesSearch;
            });

            const getStatusColor = (status) => {
                switch(status) {
                    case 'Under Inspection': return 'bg-amber-500/10 text-amber-500 border border-amber-500/10';
                    case 'Repaired': return 'bg-sky-500/10 text-sky-500 border border-sky-500/10';

                address: '',
                footerNote: 'شكراً لتعاملكم معنا 🙏',

                try {
                    return { ...defaultSettings, ...JSON.parse(localStorage.getItem('shopSettings') || '{}') };
                } catch { return defaultSettings; }
            });
            const [saved, setSaved] = useState(false);

            const handleChange = (key, value) => {
                setSettings(prev => ({ ...prev, [key]: value }));
                setSaved(false);
            };

            const handleSave = (e) => {

                            <div class="grid grid-cols-2 gap-4">
                                <SettingsField label="رقم الهاتف / الواتساب" id="phone" value={settings.phone} onChange={v => handleChange('phone', v)} placeholder="07xxxxxxxxx" />
                                <SettingsField label="البريد الإلكتروني" id="email" value={settings.email} onChange={v => handleChange('email', v)} placeholder="example@email.com" />
                            </div>
                            <SettingsField label="العنوان / الموقع" id="address" value={settings.address} onChange={v => handleChange('address', v)} placeholder="بغداد - الكرادة - ..." />
                            <SettingsField label="نص ختام الفاتورة" id="footerNote" value={settings.footerNote} onChange={v => handleChange('footerNote', v)} placeholder="شكراً لتعاملكم معنا 🙏" />
                            <SettingsField label="رمز قفل النظام السري (Password)" id="systemPassword" value={settings.systemPassword} onChange={v => handleChange('systemPassword', v)} placeholder="123456" />

                            <div class="pt-2 flex items-center gap-4">
                                <button
                                    type="submit"
                                    class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-emerald-600/20"
                                >
                                    حفظ الإعدادات
                                </button>
                                {saved && (
                                    <span class="text-emerald-400 text-sm font-bold flex items-center gap-1">
                                        <Icon name="check-circle" className="w-4 h-4" /> تم الحفظ بنجاح!
                                    </span>
                                )}
                            </div>
                        </form>
                    </div>

                    {/* Live Invoice Preview */}
                    <div class="p-6 bg-slate-900 border border-slate-800 rounded-2xl">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-9 h-9 rounded-xl bg-sky-500/10 flex items-center justify-center">
                                <Icon name="eye" className="w-5 h-5 text-sky-400" />
                            </div>
                            <h3 class="font-bold text-sky-400">معاينة رأس الفاتورة</h3>
                        </div>
                        <div style={{background:'#064e3b', borderRadius:'12px', padding:'20px 24px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <div style={{textAlign:'left', color:'rgba(255,255,255,0.6)', fontSize:'12px', lineHeight:'2'}}>
                                {settings.phone && <div>📞 {settings.phone}</div>}
                                {settings.email && <div>✉ {settings.email}</div>}
                                {settings.address && <div>📍 {settings.address}</div>}
                                {!settings.phone && !settings.email && !settings.address && (
                                    <div style={{color:'rgba(255,255,255,0.3)'}}>أضف معلومات الاتصال</div>
                                )}
                            </div>
                            <div style={{textAlign:'right'}}>
                                <div style={{fontSize:'22px', fontWeight:'900', color:'#fff'}}>{settings.shopName || 'اسم المتجر'}</div>
                                <div style={{fontSize:'11px', color:'rgba(255,255,255,0.6)', marginTop:'2px'}}>فاتورة مبيعات / Sales Invoice</div>
                            </div>
                        </div>
                    </div>

                    {/* Database Reset (Danger Zone) */}
                    <div class="p-6 bg-rose-50 border border-rose-200 rounded-2xl shadow-sm">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-9 h-9 rounded-xl bg-rose-500/10 flex items-center justify-center">
                                <Icon name="trash-2" className="w-5 h-5 text-rose-600" />
                            </div>
                            <div>
                                <h3 class="font-bold text-rose-700">تصفير قاعدة البيانات (منطقة خطر)</h3>
                                <p class="text-xs text-rose-500 font-bold">هذا الإجراء سيقوم بمسح كافة المبيعات، البضائع، القيود المحاسبية، وأجهزة الصيانة نهائياً ولا يمكن التراجع عنه!</p>
                            </div>
                        </div>
                        <button 
                            type="button"
                            onClick={async () => {
                                const confirmReset = confirm("⚠️ تحذير: هل أنت متأكد من تصفير قاعدة البيانات ومسح كل شيء؟ لا يمكن استعادة البيانات المحذوفة!");
                                if (confirmReset) {
                                    try {
                                        const res = await axios.post('/reset-db/');
                                        if (res.data.status === 'success') {
                                            alert("تم تصفير قاعدة البيانات بالكامل بنجاح! سيتم تحديث الصفحة.");
                                            window.location.reload();
                                        }
                                    } catch (e) {
                                        alert("حدث خطأ أثناء محاولة تصفير قاعدة البيانات.");
                                    }
                                }
                            }}
                            class="px-6 py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl text-xs transition-all shadow-md shadow-rose-600/10 flex items-center gap-2"
                        >
                            <Icon name="alert-triangle" className="w-4 h-4" />
                            تصفير كل شيء وبدء عمل حقيقي
                        </button>
                    </div>

                </div>
            );
        }

        // Render application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
